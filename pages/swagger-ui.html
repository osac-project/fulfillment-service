<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSAC Fulfillment Service API</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
  <style>
    body { margin: 0; }
    .topbar { display: none; }
    .api-selector {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: #1b1b1b;
      color: #fff;
      font-family: system-ui, sans-serif;
      font-size: 14px;
    }
    .api-selector h1 {
      font-size: 18px;
      font-weight: 600;
      margin: 0;
      margin-right: auto;
    }
    .api-selector select {
      padding: 6px 12px;
      border-radius: 4px;
      border: 1px solid #555;
      background: #333;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="api-selector">
    <h1>OSAC Fulfillment Service</h1>
    <label for="spec-select">API:</label>
    <select id="spec-select">
      <option value="openapi/v3/public.yaml">Public</option>
      <option value="openapi/v3/private.yaml">Private</option>
    </select>
  </div>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    const select = document.getElementById('spec-select');
    let ui;

    function loadSpec(url) {
      if (ui) { ui = null; document.getElementById('swagger-ui').innerHTML = ''; }
      ui = SwaggerUIBundle({
        url: url,
        dom_id: '#swagger-ui',
        presets: [SwaggerUIBundle.presets.apis, SwaggerUIBundle.SwaggerUIStandalonePreset],
        layout: 'BaseLayout',
        deepLinking: true,
      });
    }

    select.addEventListener('change', function() { loadSpec(this.value); });
    loadSpec(select.value);
  </script>
</body>
</html>
