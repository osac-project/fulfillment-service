apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: {{ .Release.Namespace }}
  name: keycloak-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak-service
  template:
    metadata:
      labels:
        app: keycloak-service
    spec:
      volumes:
      - name: realm
        secret:
          secretName: keycloak-realm
      - name: tls
        secret:
          secretName: keycloak-tls
      - name: db
        projected:
          sources:
          {{ if .Values.database.connection }}
          {{ range .Values.database.connection }}
          {{ if .configMap }}
          - configMap:
              name: {{ .configMap.name }}
              items:
              {{ range .configMap.items }}
              - key: {{ .key }}
                path: {{ .param }}
              {{ end }}
          {{ end }}
          {{ if .secret }}
          - secret:
              name: {{ .secret.name }}
              items:
              {{ range .secret.items }}
              - key: {{ .key }}
                path: {{ .param }}
              {{ end }}
          {{ end }}
          {{ end }}
          {{ else }}
          []
          {{ end }}
      containers:
      - name: server
        image: "{{ .Values.images.keycloak }}"
        imagePullPolicy: IfNotPresent
        volumeMounts:
        - name: realm
          mountPath: /opt/keycloak/data/import
          readOnly: true
        - name: tls
          mountPath: /opt/keycloak/tls
          readOnly: true
        - name: db
          mountPath: /opt/keycloak/db
          readOnly: true
        env:
        - name: KC_BOOTSTRAP_ADMIN_USERNAME
          value: admin
        - name: KC_BOOTSTRAP_ADMIN_PASSWORD
          value: admin
        - name: KC_HOSTNAME_STRICT
          value: "true"
        - name: KC_HOSTNAME_STRICT_HTTPS
          value: "true"
        - name: KC_HTTP_ENABLED
          value: "false"
        - name: KC_HTTPS_ENABLED
          value: "true"
        - name: KC_HTTPS_PORT
          value: "8000"
        - name: KC_HTTPS_CERTIFICATE_FILE
          value: "/opt/keycloak/tls/tls.crt"
        - name: KC_HTTPS_CERTIFICATE_KEY_FILE
          value: "/opt/keycloak/tls/tls.key"
        - name: KC_HOSTNAME
          value: "{{ include "keycloak.hostname" . }}"
        - name: KC_HOSTNAME_PORT
          value: "8000"
        - name: KC_DB
          value: "postgres"
        command:
        - /bin/bash
        - -c
        - {{ .Files.Get "files/start.sh" | quote }}
        ports:
        - name: https
          containerPort: 8000
        readinessProbe:
          httpGet:
            path: /realms/master
            port: 8000
            scheme: HTTPS
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /realms/master
            port: 8000
            scheme: HTTPS
          initialDelaySeconds: 60
          periodSeconds: 30
