apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: {{ .Release.Namespace }}
  name: fulfillment-policy-server
spec:
  selector:
    matchLabels:
      app: fulfillment-policy-server
  replicas: 1
  strategy:
    type: {{ if .Values.debug }}Recreate{{ else }}RollingUpdate{{ end }}
  template:
    metadata:
      labels:
        app: fulfillment-policy-server
    spec:
      volumes:
      - name: tls
        secret:
          secretName: fulfillment-policy-server-tls
      containers:
      - name: policy-server
        image: {{ .Values.images.service }}
        volumeMounts:
        - name: tls
          mountPath: /etc/fulfillment-policy-server/tls
        command:
        {{ if .Values.debug }}
        - dlv
        - exec
        - /usr/local/bin/fulfillment-service
        - --headless
        - --api-version=2
        - --listen=:30004
        - --accept-multiclient
        - --continue
        - --
        {{ else }}
        - /usr/local/bin/fulfillment-service
        {{ end }}
        - start
        - policy-server
        - --log-level={{ .Values.log.level }}
        - --grpc-listener-address=0.0.0.0:8000
        - --grpc-listener-tls-crt=/etc/fulfillment-policy-server/tls/tls.crt
        - --grpc-listener-tls-key=/etc/fulfillment-policy-server/tls/tls.key
        - --http-listener-address=0.0.0.0:8001
        - --http-listener-tls-crt=/etc/fulfillment-policy-server/tls/tls.crt
        - --http-listener-tls-key=/etc/fulfillment-policy-server/tls/tls.key
        - --policy-value=namespace={{ .Release.Namespace }}
        ports:
        - name: grpc
          containerPort: 8000
          protocol: TCP
        - name: https
          containerPort: 8001
          protocol: TCP
        {{ if .Values.debug }}
        - name: debug
          containerPort: 30004
          hostPort: 30004
          protocol: TCP
        {{ end }}
        {{ if not .Values.debug }}
        livenessProbe:
          exec:
            command:
            - /usr/local/bin/fulfillment-service
            - probe
            - grpc-server
            - --ca-file=/etc/fulfillment-policy-server/tls/ca.crt
            - --grpc-server-address=localhost:8000
            - --grpc-server-timeout=1s
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - /usr/local/bin/fulfillment-service
            - probe
            - grpc-server
            - --ca-file=/etc/fulfillment-policy-server/tls/ca.crt
            - --grpc-server-address=localhost:8000
            - --grpc-server-timeout=1s
          initialDelaySeconds: 5
          periodSeconds: 10
        {{ end }}
