{{ if eq .Values.variant "openshift" }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  namespace: {{ .Release.Namespace }}
  name: fulfillment-api
spec:
  host: {{ .Values.externalHostname }}
  to:
    kind: Service
    name: fulfillment-api
  port:
    targetPort: external-api
  tls:
    termination: passthrough

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  namespace: {{ .Release.Namespace }}
  name: fulfillment-internal-api
spec:
  host: {{ include "fulfillment-internal-api.hostname" . }}
  to:
    kind: Service
    name: fulfillment-internal-api
  port:
    targetPort: internal-api
  tls:
    termination: passthrough

{{ end }}

{{ if eq .Values.variant "kind" }}
apiVersion: gateway.networking.k8s.io/v1alpha3
kind: TLSRoute
metadata:
  namespace: {{ .Release.Namespace }}
  name: fulfillment-api
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    namespace: envoy-gateway
    name: default
    sectionName: tls
  hostnames:
  - {{ include "fulfillment-api.hostname" . }}
  rules:
  - backendRefs:
    - name: fulfillment-api
      port: 8000

---
apiVersion: gateway.networking.k8s.io/v1alpha3
kind: TLSRoute
metadata:
  namespace: {{ .Release.Namespace }}
  name: fulfillment-internal-api
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    namespace: envoy-gateway
    name: default
    sectionName: tls
  hostnames:
  - {{ include "fulfillment-internal-api.hostname" . }}
  rules:
  - backendRefs:
    - name: fulfillment-internal-api
      port: 8001

{{ end }}
