{{- $caBundleConfigMap := required "certs.caBundle.configMap is required" .Values.certs.caBundle.configMap }}
{{- $keycloakUrl := regexReplaceAll "/+$" (required "keycloak.url is required" .Values.keycloak.url) "" }}
{{- $keycloakCredentials := required "keycloak.credentials is required" .Values.keycloak.credentials }}
{{- $apiCredentials := required "api.credentials is required" .Values.api.credentials }}

apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: {{ .Release.Namespace }}
  name: fulfillment-controller
spec:
  selector:
    matchLabels:
      app: fulfillment-controller
  replicas: 1
  strategy:
    type: {{ if .Values.debug }}Recreate{{ else }}RollingUpdate{{ end }}
  template:
    metadata:
      labels:
        app: fulfillment-controller
    spec:
      serviceAccountName: controller
      volumes:
      - name: cas
        configMap:
          name: {{ $caBundleConfigMap }}
      - name: tls
        secret:
          secretName: fulfillment-controller-tls
      - name: keycloak-credentials
        projected:
          sources:
          {{- range $keycloakCredentials }}
          {{- if .configMap }}
          - configMap:
              name: {{ .configMap.name }}
              items:
              {{- range .configMap.items }}
              - key: {{ .key }}
                path: {{ .param }}
              {{- end }}
          {{- end }}
          {{- if .secret }}
          - secret:
              name: {{ .secret.name }}
              items:
              {{- range .secret.items }}
              - key: {{ .key }}
                path: {{ .param }}
              {{- end }}
          {{- end }}
          {{- end }}
      - name: api-credentials
        projected:
          sources:
          {{ range $apiCredentials }}
          {{ if .configMap }}
          - configMap:
              name: {{ .configMap.name }}
              items:
              {{ range .configMap.items }}
              - key: {{ .key }}
                path: {{ .param }}
              {{ end }}
          {{ end }}
          {{ if .secret }}
          - secret:
              name: {{ .secret.name }}
              items:
              {{ range .secret.items }}
              - key: {{ .key }}
                path: {{ .param }}
              {{ end }}
          {{ end }}
          {{ end }}
      containers:
      - name: controller
        image: {{ .Values.images.service }}
        volumeMounts:
        - name: cas
          mountPath: /etc/fulfillment-controller/tls/cas
        - name: tls
          mountPath: /etc/fulfillment-controller/tls
        - name: keycloak-credentials
          mountPath: /etc/fulfillment-controller/keycloak
          readOnly: true
        - name: api-credentials
          mountPath: /etc/fulfillment-controller/credentials
          readOnly: true
        command:
        {{ if .Values.debug }}
        - dlv
        - exec
        - /usr/local/bin/fulfillment-service
        - --headless
        - --api-version=2
        - --listen=:30003
        - --accept-multiclient
        - --continue
        - --
        {{ else }}
        - /usr/local/bin/fulfillment-service
        {{ end }}
        - start
        - controller
        - --log-level={{ .Values.log.level }}
        - --log-headers={{ .Values.log.headers }}
        - --log-bodies={{ .Values.log.bodies }}
        - --ca-file=/etc/fulfillment-controller/tls/cas
        - --keycloak-url={{ $keycloakUrl }}
        - --keycloak-client-id-file=/etc/fulfillment-controller/keycloak/client-id
        - --keycloak-client-secret-file=/etc/fulfillment-controller/keycloak/client-secret
        - --api-server-address=fulfillment-internal-api:8001
        - --api-keep-alive=5m
        - --api-client-id-file=/etc/fulfillment-controller/credentials/client-id
        - --api-client-secret-file=/etc/fulfillment-controller/credentials/client-secret
        - --grpc-listener-address=0.0.0.0:8000
        - --grpc-listener-tls-crt=/etc/fulfillment-controller/tls/tls.crt
        - --grpc-listener-tls-key=/etc/fulfillment-controller/tls/tls.key
        - --metrics-listener-address=0.0.0.0:8002
        ports:
        - name: grpc
          containerPort: 8000
          protocol: TCP
        - name: metrics
          containerPort: 8002
          protocol: TCP
        {{ if .Values.debug }}
        - name: debug
          containerPort: 30003
          hostPort: 30003
          protocol: TCP
        {{ end }}
        {{ if not .Values.debug }}
        livenessProbe:
          exec:
            command:
            - /usr/local/bin/fulfillment-service
            - probe
            - grpc-server
            - --ca-file=/etc/fulfillment-controller/tls/ca.crt
            - --grpc-server-address=localhost:8000
            - --grpc-server-timeout=1s
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - /usr/local/bin/fulfillment-service
            - probe
            - grpc-server
            - --ca-file=/etc/fulfillment-controller/tls/ca.crt
            - --grpc-server-address=localhost:8000
            - --grpc-server-timeout=1s
          initialDelaySeconds: 5
          periodSeconds: 10
        {{ end }}
