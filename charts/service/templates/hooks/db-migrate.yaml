{{- if .Values.dbMigrate.enabled }}
{{- if not .Values.dbMigrate.dbUrlFile }}
{{- fail "dbMigrate: dbUrlFile must be set when dbMigrate.enabled is true" }}
{{- end }}
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fulfillment-service.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        {{- include "fulfillment-service.labels" . | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
      restartPolicy: Never
      containers:
      - name: migrate
        image: {{ .Values.dbMigrate.image }}
        command:
        - fulfillment-service
        - migrate
        - --db-url-file
        - {{ .Values.dbMigrate.dbUrlFile | quote }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
  backoffLimit: {{ .Values.dbMigrate.backoffLimit }}
{{- end }}
