apiVersion: authorino.kuadrant.io/v1beta3
kind: AuthConfig
metadata:
  namespace: {{ .Release.Namespace }}
  name: fulfillment-service
spec:
  hosts:
  - "*"
  authentication:
    "fulfillment-api":
      kubernetesTokenReview:
        audiences:
        # TODO: This is the default audience for the Kubernetes API server. We should probably create a custom audience,
        # for example `fulfillment-api`, but then the users will need to create tokens for that audience. For example:
        #
        # $ kubectl create token -n osac --audience=fulfillment-api client
        #
        # It is not clear to me if we can also use that audience for the tokens generated automatically for the service
        # accounts of other pods, for example for the `controller` pods. It may be possible using a projected service
        # account token, something like this:
        #
        # apiVersion: v1
        # kind: Pod
        # metadata:
        #   name: my
        # spec:
        #   containers:
        #   - volumeMounts:
        #     - mountPath: /var/run/secrets/tokens
        #       name: api-token
        #   volumes:
        #   - name: api-token
        #     projected:
        #       sources:
        #       - serviceAccountToken:
        #           path: api-token
        #           audience: fulfillment-api
        #
        # But that needs to be tested.
        #
        # Note also that different flavours of Kubernetes use different audicences for the service account tokens. Kind
        # uses the full DNS name `kubernetes.default.svc.cluster.local`, but OpenShift uses the `kubernetes.default.svc`
        # abbreviation.
        - https://kubernetes.default.svc
        - https://kubernetes.default.svc.cluster.local
      overrides:
        authnMethod:
          value: serviceaccount
    "keycloak-jwt":
      jwt:
        issuerUrl: {{ required "auth.issuerUrl is required" .Values.auth.issuerUrl }}
      overrides:
        authnMethod:
          value: jwt
  authorization:
    "rbac":
      opa:
        allValues: true
        rego: |
          import rego.v1

          # Emergency service accounts are Kubernetes service accounts that are allowed to act as administrators in case
          # of emergency situations where it isn't possible to get a valid JWT token from the identity provider.
          emergency_service_accounts := {
            "system:serviceaccount:{{ .Release.Namespace }}:admin",
          }

          # Admin service accounts are service accounts that are allowed to act as administrators.
          admin_service_accounts := {
            "service-account-osac-admin",
            "service-account-osac-controller",
          }

          # Admin groups are groups that are allowed to act as administrators.
          admin_groups := {
            "admins",
          }

          # Tenant admin roles - users with these roles can manage users in their tenant
          tenant_admin_roles := {
            "tenant-admin",
            "tenant-user-manager",
          }

          # Tenant IdP manager roles - users with these roles can manage IdP config and assign roles
          tenant_idp_manager_roles := {
            "tenant-admin",
            "tenant-idp-manager",
          }

          # Get the gRPC method:
          grpc_method := input.context.request.http.path

          # Get the subject name:
          subject_name = input.auth.identity.user.username if {
            input.auth.identity.authnMethod == "serviceaccount"
          }
          subject_name = input.auth.identity.username if {
            input.auth.identity.authnMethod == "jwt"
          }

          # Get the subject groups:
          subject_groups = input.auth.identity.user.groups if {
            input.auth.identity.authnMethod == "serviceaccount"
          }
          subject_groups = input.auth.identity.groups if {
            input.auth.identity.authnMethod == "jwt"
          }

          # Get the subject's tenant(s) from JWT claims or service account namespace
          # For JWT users, this comes from the "organization" scope which is in defaultClientScopes.
          # The organization claim is required for tenant admins and IdP managers.
          # For regular users without organization claim, fall back to groups.
          default subject_tenants = []
          subject_tenants = input.auth.identity.organization if {
            input.auth.identity.authnMethod == "jwt"
            input.auth.identity.organization
          }
          subject_tenants = input.auth.identity.organizations if {
            input.auth.identity.authnMethod == "jwt"
            input.auth.identity.organizations
          }
          # Fallback to groups for JWT users without organization claim
          subject_tenants = subject_groups if {
            input.auth.identity.authnMethod == "jwt"
            not input.auth.identity.organization
            not input.auth.identity.organizations
          }
          # For service accounts, use groups as tenants
          subject_tenants = subject_groups if {
            input.auth.identity.authnMethod == "serviceaccount"
          }

          # Get the subject's realm roles from JWT
          default subject_realm_roles = []
          subject_realm_roles = input.auth.identity.realm_access.roles if {
            input.auth.identity.authnMethod == "jwt"
            input.auth.identity.realm_access
            input.auth.identity.realm_access.roles
          }

          # Check if an account is an admin account:
          default is_admin = false
          is_admin if {
            subject_name in emergency_service_accounts
          }
          is_admin if {
            subject_name in admin_service_accounts
          }
          is_admin if {
            some group in subject_groups
            group in admin_groups
          }

          # Check if an account is a tenant admin (can manage users AND IdP in their tenant):
          default is_tenant_admin = false
          is_tenant_admin if {
            some role in subject_realm_roles
            role in tenant_admin_roles
          }

          # Check if an account is a tenant IdP manager (can ONLY manage IdP, NOT users):
          default is_tenant_idp_manager = false
          is_tenant_idp_manager if {
            some role in subject_realm_roles
            role in tenant_idp_manager_roles
          }

          # Check if an account is a regular client (no admin or tenant management roles):
          default is_client = false
          is_client if {
            not is_admin
            not is_tenant_admin
            not is_tenant_idp_manager
          }

          # Check if account has client-level permissions (clients, tenant admins, or IdP managers):
          default has_client_permissions = false
          has_client_permissions if {
            is_client
          }
          has_client_permissions if {
            is_tenant_admin
          }
          has_client_permissions if {
            is_tenant_idp_manager
          }

          # Allow metadata, reflection and health to everyone:
          allow if {
            startswith(grpc_method, "/metadata.")
          }
          allow if {
            startswith(grpc_method, "/grpc.reflection.")
          }
          allow if {
            startswith(grpc_method, "/grpc.health.")
          }

          # Allow specific methods to clients (and tenant admins/IdP managers who inherit client permissions):
          allow if {
            has_client_permissions
            grpc_method in {
              "/osac.public.v1.ClusterTemplates/Get",
              "/osac.public.v1.ClusterTemplates/List",
              "/osac.public.v1.Clusters/Create",
              "/osac.public.v1.Clusters/Delete",
              "/osac.public.v1.Clusters/Get",
              "/osac.public.v1.Clusters/GetKubeconfig",
              "/osac.public.v1.Clusters/GetKubeconfigViaHttp",
              "/osac.public.v1.Clusters/GetPassword",
              "/osac.public.v1.Clusters/GetPasswordViaHttp",
              "/osac.public.v1.Clusters/List",
              "/osac.public.v1.Clusters/Update",
              "/osac.public.v1.ComputeInstanceTemplates/Get",
              "/osac.public.v1.ComputeInstanceTemplates/List",
              "/osac.public.v1.ComputeInstances/Create",
              "/osac.public.v1.ComputeInstances/Delete",
              "/osac.public.v1.ComputeInstances/Get",
              "/osac.public.v1.ComputeInstances/List",
              "/osac.public.v1.ComputeInstances/Update",
              "/osac.public.v1.Console/Connect",
              "/osac.public.v1.Console/GetAccess",
              "/osac.public.v1.Events/Watch",
              "/osac.public.v1.HostTypes/Get",
              "/osac.public.v1.HostTypes/List",
              "/osac.public.v1.NetworkClasses/Create",
              "/osac.public.v1.NetworkClasses/Delete",
              "/osac.public.v1.NetworkClasses/Get",
              "/osac.public.v1.NetworkClasses/List",
              "/osac.public.v1.NetworkClasses/Update",
              "/osac.public.v1.Subnets/Create",
              "/osac.public.v1.Subnets/Delete",
              "/osac.public.v1.Subnets/Get",
              "/osac.public.v1.Subnets/List",
              "/osac.public.v1.Subnets/Update",
              "/osac.public.v1.VirtualNetworks/Create",
              "/osac.public.v1.VirtualNetworks/Delete",
              "/osac.public.v1.VirtualNetworks/Get",
              "/osac.public.v1.VirtualNetworks/List",
              "/osac.public.v1.VirtualNetworks/Update",
              "/osac.public.v1.SecurityGroups/Create",
              "/osac.public.v1.SecurityGroups/Delete",
              "/osac.public.v1.SecurityGroups/Get",
              "/osac.public.v1.SecurityGroups/List",
              "/osac.public.v1.SecurityGroups/Update",
              "/osac.public.v1.PublicIPs/Create",
              "/osac.public.v1.PublicIPs/Delete",
              "/osac.public.v1.PublicIPs/Get",
              "/osac.public.v1.PublicIPs/List",
              "/osac.public.v1.Roles/Get",
              "/osac.public.v1.Roles/List",
              "/osac.public.v1.RoleBindings/Get",
              "/osac.public.v1.RoleBindings/List",
              "/osac.public.v1.Projects/Get",
              "/osac.public.v1.Projects/List",
            }
          }

          # Tenant-scoped user and project management for tenant admins
          # Note: Tenant admins can manage users. IdP managers cannot (they only manage IdP config).
          # OPA performs method-level authorization (can this user call this method?).
          # The application layer enforces resource-level authorization via the generic server's
          # determineAssignedTenant validation, which ensures users can only assign a tenant they have visibility to.
          allow if {
            is_tenant_admin
            grpc_method in {
              "/osac.public.v1.Users/Create",
              "/osac.public.v1.Users/Get",
              "/osac.public.v1.Users/List",
              "/osac.public.v1.Users/Update",
              "/osac.public.v1.Users/Delete",
              "/osac.public.v1.Projects/Create",
              "/osac.public.v1.Projects/Delete",
              "/osac.public.v1.Projects/Update",
            }
          }

          # Tenant-scoped IdP management (when APIs are added, e.g., IdentityProviders/*, RoleBindings/*)
          # For now, no IdP management APIs exist, so no rules needed yet
          # TODO: Add allow rules for (is_tenant_admin or is_tenant_idp_manager) when IdP APIs are implemented
          # Both tenant admins (full permissions) and tenant IdP managers (IdP-only) should be allowed

          # Allow everything to admins:
          allow if {
            is_admin
          }

    # Resource-level authorization with Keycloak Authorization Services (only for JWT users on Project operations)
    "resource-authz":
      when:
      - selector: auth.identity.authnMethod
        operator: eq
        value: jwt
      - selector: context.request.http.path
        operator: matches
        value: ^/osac\.public\.v1\.Projects/(Get|List|Create|Update|Delete)$
      opa:
        allValues: true
        rego: |
          import rego.v1

          keycloak_base := "{{ required "auth.issuerUrl is required" .Values.auth.issuerUrl }}"
          uma_client_id := "{{ required "idp.umaClientId is required" .Values.idp.umaClientId }}"

          # Map gRPC method to scope
          scope_map := {
            "/osac.public.v1.Projects/Get": "VIEW_PROJECT",
            "/osac.public.v1.Projects/List": "VIEW_PROJECT",
            "/osac.public.v1.Projects/Create": "MANAGE_PROJECT",
            "/osac.public.v1.Projects/Update": "MANAGE_PROJECT",
            "/osac.public.v1.Projects/Delete": "MANAGE_PROJECT",
          }
          required_scope := scope_map[input.context.request.http.path]

          # Extract tenant and project name from request body or path
          # For Create: metadata.tenant and metadata.name from request body
          # For Get/Update/Delete: could extract from path or require body
          # For List: use tenant from user's token
          request_body := object.get(input.context.request.http, "body", "")

          # Decode base64 body if present (gRPC-Web sends base64-encoded protobuf)
          # For simplicity, we use a fallback approach:
          # - For Create/Update: check tenant from auth context (user can only create in their tenant)
          # - For specific operations: use Default Resource as catch-all
          # - Individual project resources are created after project creation

          # Get user's tenant from auth context
          user_tenant := object.get(input.auth.authorization.rbac, "subject_tenants", [""])[0]

          access_token := trim_prefix(object.get(input.context.request.http.headers, "authorization", ""), "Bearer ")

          # For Create operations, request permission against Default Resource
          # Individual project resources don't exist yet at creation time
          # For other operations, in production you'd extract project name from the request
          # and check against PROJECT-{tenant}-{projectName}

          # Request UMA ticket for the scope
          # UMA permission format: resource#scope or just scope for any matching resource
          ticket_response := http.send({
            "url": concat("", [keycloak_base, "/protocol/openid-connect/token"]),
            "method": "post",
            "headers": {
              "Authorization": concat(" ", ["Bearer", access_token]),
              "Content-Type": "application/x-www-form-urlencoded"
            },
            "raw_body": concat("", [
              "grant_type=urn:ietf:params:oauth:grant-type:uma-ticket",
              "&audience=", uma_client_id,
              "&permission=#", required_scope
            ])
          })

          # Check if we got an RPT with permissions for the required scope
          allow if {
            ticket_response.status_code == 200
            rpt := ticket_response.body.access_token
            permissions := object.get(io.jwt.decode(rpt)[1], "authorization", {"permissions": []}).permissions
            some permission in permissions
            required_scope in permission.scopes
          }
  response:
    success:
      headers:
        "x-subject":
          json:
            properties:
              user:
                expression: |
                  auth.identity.authnMethod == "jwt"
                    ? auth.identity.username
                    : auth.identity.user.username.split(":")[3]
              tenants:
                expression: |
                  auth.authorization.rbac.is_admin
                    ? ["*"]
                    : auth.identity.authnMethod == "jwt"
                      ? auth.authorization.rbac.subject_tenants
                      : [auth.identity.user.username.split(":")[2]]
