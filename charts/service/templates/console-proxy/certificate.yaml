apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  namespace: {{ .Release.Namespace }}
  name: fulfillment-console-proxy
spec:
  issuerRef:
    kind: {{ .Values.certs.issuerRef.kind }}
    name: {{ required "certs.issuerRef.name is required" .Values.certs.issuerRef.name }}
  dnsNames:
  - localhost
  - fulfillment-console-proxy
  - fulfillment-console-proxy.{{ .Release.Namespace }}
  - fulfillment-console-proxy.{{ .Release.Namespace }}.svc.cluster.local
  secretName: fulfillment-console-proxy-tls
  privateKey:
    rotationPolicy: Always
