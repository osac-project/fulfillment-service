# Generates Python gRPC stubs from the public API proto files.
# Output lands in python/src/ and is not checked in — generated in CI only.
#
# Usage:
#   buf generate --template buf.gen.python.yaml

version: v2

inputs:
- directory: proto/public

plugins:
- remote: buf.build/protocolbuffers/python:v29.3
  out: python/src

- remote: buf.build/grpc/python:v1.68.1
  out: python/src
