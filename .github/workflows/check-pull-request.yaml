name: Check pull request

on:
  pull_request:
    branches:
    - main

permissions:
  contents: read

jobs:

  check-pre-commit:
    name: Check pre-commit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      with:
        persist-credentials: false
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
    - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd  # v3.0.1

  check-code-format:
    name: Check code format
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      with:
        persist-credentials: false
    - uses: ./.github/actions/setup-go
    - run: |
        gofmt -s -l -w .
        git diff --exit-code

  check-generated-code:
    name: Check generated code
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      with:
        persist-credentials: false
    - uses: bufbuild/buf-action@91da6f6a1a2c877c182debad24ca0a8a9d848be7  # v1
      with:
        version: '1.50.0'
        setup_only: true
    - run: |
        buf generate
        git diff --exit-code

  run-unit-tests:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      with:
        persist-credentials: false
    - uses: ./.github/actions/setup-go
    - run: |
        ginkgo run --timeout 1h -r internal

  build-binaries:
    name: Build binaries
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      with:
        persist-credentials: false
    - uses: ./.github/actions/setup-go
    - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89  # v7
      with:
        args: build --snapshot --clean

  run-integration-tests-helm:
    name: Run integration tests - Helm
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      with:
        persist-credentials: false
    - uses: ./.github/actions/setup-go
    - run: |
        echo '127.0.0.1 fulfillment-api.osac.svc.cluster.local' | sudo tee -a /etc/hosts
        echo '127.0.0.1 fulfillment-internal-api.osac.svc.cluster.local' | sudo tee -a /etc/hosts
        echo '127.0.0.1 keycloak.keycloak.svc.cluster.local' | sudo tee -a /etc/hosts
        IT_DEPLOY_MODE=helm ginkgo run --timeout 1h -v it
    - if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
      with:
        name: logs-helm
        path: logs
        retention-days: 7

  run-integration-tests-kustomize:
    name: Run integration tests - Kustomize
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      with:
        persist-credentials: false
    - uses: ./.github/actions/setup-go
    - run: |
        echo '127.0.0.1 fulfillment-api.osac.svc.cluster.local' | sudo tee -a /etc/hosts
        echo '127.0.0.1 fulfillment-internal-api.osac.svc.cluster.local' | sudo tee -a /etc/hosts
        echo '127.0.0.1 keycloak.keycloak.svc.cluster.local' | sudo tee -a /etc/hosts
        IT_DEPLOY_MODE=kustomize ginkgo run --timeout 1h -v it
    - if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
      with:
        name: logs-kustomize
        path: logs
        retention-days: 7
