# Generates Python gRPC stubs from the public proto files and publishes the
# resulting wheel to GitHub Packages as 'osac-public-grpc'.

name: Publish Python client

on:
  push:
    tags:
    - 'v*'

jobs:

  publish-python-client:
    name: Publish Python client
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v6

    - uses: bufbuild/buf-action@v1
      with:
        version: '1.50.0'
        setup_only: true
        token: ${{ secrets.BUF_TOKEN }}

    - name: Generate Python gRPC stubs
      run: buf generate --template buf.gen.python.yaml

    - uses: astral-sh/setup-uv@v5
      with:
        python-version: '3.11'

    - name: Build wheel
      run: |
        # Strip the leading 'v' from the tag (v1.2.3 → 1.2.3).
        export PACKAGE_VERSION="${GITHUB_REF_NAME#v}"
        uv build python/

    - name: Verify build artifacts
      run: |
        ls -lh python/dist/
        test -n "$(ls python/dist/*.whl 2>/dev/null)" || { echo "Error: no wheel found in python/dist/"; exit 1; }

    - name: Publish to GitHub Packages
      run: |
        uvx twine upload \
          --repository-url https://python.pkg.github.com/${{ github.repository_owner }}/ \
          --username __token__ \
          --password ${{ secrets.GITHUB_TOKEN }} \
          --non-interactive \
          python/dist/*
