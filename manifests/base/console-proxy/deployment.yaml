apiVersion: apps/v1
kind: Deployment
metadata:
  name: fulfillment-console-proxy
spec:
  selector:
    matchLabels:
      app: fulfillment-console-proxy
  replicas: 1
  template:
    metadata:
      labels:
        app: fulfillment-console-proxy
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      volumes:
      - name: cas
        configMap:
          name: ca-bundle
      - name: tls
        secret:
          secretName: fulfillment-console-proxy-tls
      - name: token-encryption-key
        secret:
          secretName: fulfillment-token-encryption-keypair
          items:
          - key: tls.key
            path: tls.key
      containers:
      - name: console-proxy
        image: fulfillment-service
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: cas
          mountPath: /etc/fulfillment-console-proxy/tls/cas
        - name: tls
          mountPath: /etc/fulfillment-console-proxy/tls
        - name: token-encryption-key
          mountPath: /etc/fulfillment-token-encryption
          readOnly: true
        command:
        - /usr/local/bin/fulfillment-service
        - start
        - console-proxy
        - --log-level=info
        - --ca-file=/etc/fulfillment-console-proxy/tls/cas
        - --token-issuer=https://fulfillment-api:8000
        - --token-decryption-key=/etc/fulfillment-token-encryption/tls.key
        - --grpc-listener-address=0.0.0.0:8000
        - --grpc-listener-tls-crt=/etc/fulfillment-console-proxy/tls/tls.crt
        - --grpc-listener-tls-key=/etc/fulfillment-console-proxy/tls/tls.key
        - --console-listener-address=0.0.0.0:8090
        - --console-listener-tls-crt=/etc/fulfillment-console-proxy/tls/tls.crt
        - --console-listener-tls-key=/etc/fulfillment-console-proxy/tls/tls.key
        - --console-cors-allowed-origins=https://fulfillment-api
        - --metrics-listener-address=0.0.0.0:8002
        ports:
        - name: grpc
          containerPort: 8000
          protocol: TCP
        - name: console
          containerPort: 8090
          protocol: TCP
        - name: metrics
          containerPort: 8002
          protocol: TCP
        livenessProbe:
          exec:
            command:
            - /usr/local/bin/fulfillment-service
            - probe
            - grpc-server
            - --ca-file=/etc/fulfillment-console-proxy/tls/cas
            - --grpc-server-address=localhost:8000
            - --grpc-server-timeout=1s
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - /usr/local/bin/fulfillment-service
            - probe
            - grpc-server
            - --ca-file=/etc/fulfillment-console-proxy/tls/cas
            - --grpc-server-address=localhost:8000
            - --grpc-server-timeout=1s
          initialDelaySeconds: 5
          periodSeconds: 10
