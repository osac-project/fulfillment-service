# Dedicated signing certificate for tokens issued by this service. Separate from
# the TLS serving cert (fulfillment-grpc-server) to isolate blast radius: TLS
# compromise does not enable token forgery. The SAN does not need to resolve
# in DNS -- it is used for identity verification only.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: fulfillment-token-signer
spec:
  issuerRef:
    kind: ClusterIssuer
    name: default-ca
  dnsNames:
  - fulfillment-token-signer
  secretName: fulfillment-token-signer-tls
  usages:
  - digital signature
  privateKey:
    rotationPolicy: Always
