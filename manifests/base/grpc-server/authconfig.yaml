apiVersion: authorino.kuadrant.io/v1beta3
kind: AuthConfig
metadata:
  name: fulfillment-service
spec:
  hosts:
  - "*"
  authentication:
    "fulfillment-api":
      kubernetesTokenReview:
        audiences:
        - https://kubernetes.default.svc
        - https://kubernetes.default.svc.cluster.local
    "keycloak-jwt":
      jwt:
        issuerUrl: https://keycloak.keycloak.svc.cluster.local:8000/realms/osac
  authorization:
    default:
      opa:
        allValues: true
        externalPolicy:
          url: https://fulfillment-policy-server.osac.svc.cluster.local:8001/authz.rego
          ttl: 300
  response:
    success:
      headers:
        x-subject:
          plain:
            expression: auth.authorization.default.subject_json
