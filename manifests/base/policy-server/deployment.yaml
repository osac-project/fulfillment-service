apiVersion: apps/v1
kind: Deployment
metadata:
  name: fulfillment-policy-server
spec:
  selector:
    matchLabels:
      app: fulfillment-policy-server
  replicas: 1
  template:
    metadata:
      labels:
        app: fulfillment-policy-server
    spec:
      volumes:
      - name: tls
        secret:
          secretName: fulfillment-policy-server-tls
      containers:
      - name: policy-server
        image: fulfillment-service
        imagePullPolicy: IfNotPresent
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        volumeMounts:
        - name: tls
          mountPath: /etc/fulfillment-policy-server/tls
        command:
        - /usr/local/bin/fulfillment-service
        - start
        - policy-server
        - --log-level=info
        - --grpc-listener-address=0.0.0.0:8000
        - --grpc-listener-tls-crt=/etc/fulfillment-policy-server/tls/tls.crt
        - --grpc-listener-tls-key=/etc/fulfillment-policy-server/tls/tls.key
        - --http-listener-address=0.0.0.0:8001
        - --http-listener-tls-crt=/etc/fulfillment-policy-server/tls/tls.crt
        - --http-listener-tls-key=/etc/fulfillment-policy-server/tls/tls.key
        - --policy-value=namespace=$(POD_NAMESPACE)
        ports:
        - name: grpc
          containerPort: 8000
          protocol: TCP
        - name: https
          containerPort: 8001
          protocol: TCP
        livenessProbe:
          exec:
            command:
            - /usr/local/bin/fulfillment-service
            - probe
            - grpc-server
            - --ca-file=/etc/fulfillment-policy-server/tls/ca.crt
            - --grpc-server-address=localhost:8000
            - --grpc-server-timeout=1s
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - /usr/local/bin/fulfillment-service
            - probe
            - grpc-server
            - --ca-file=/etc/fulfillment-policy-server/tls/ca.crt
            - --grpc-server-address=localhost:8000
            - --grpc-server-timeout=1s
          initialDelaySeconds: 5
          periodSeconds: 10
