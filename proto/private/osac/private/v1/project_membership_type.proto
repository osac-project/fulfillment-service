syntax = "proto3";

package osac.private.v1;

import "osac/private/v1/metadata_type.proto";

// ProjectMembership represents a member's association with a project and their role within it.
message ProjectMembership {
  // Unique identifier of the project membership.
  string id = 1;

  // Object metadata.
  Metadata metadata = 2;

  // Desired state of the project membership.
  ProjectMembershipSpec spec = 3;

  // Observed state of the project membership.
  ProjectMembershipStatus status = 4;
}

// Describes the members of a project.
message ProjectMembershipSpec {
  // Role of the members in the project. This indicates whether the members are viewers, managers, etc.
  ProjectMembershipRole role = 2;

  // Identifiers of the users that are members of the project. These are user identifiers (the `id` field of User
  // objects), not usernames or email addresses.
  repeated string users = 3;
}

// Describes the role of a member in a project.
enum ProjectMembershipRole {
  // Default value, should not be used.
  PROJECT_MEMBERSHIP_ROLE_UNSPECIFIED = 0;

  // The member can view the project and its resources.
  PROJECT_MEMBERSHIP_ROLE_VIEWER = 1;

  // The member can manage the project, including adding/removing other members.
  PROJECT_MEMBERSHIP_ROLE_MANAGER = 2;
}

// Describes the observed state of a project membership.
message ProjectMembershipStatus {
  // Current state of the project membership.
  ProjectMembershipState state = 1;

  // Human-readable message providing additional details about the current state. For example, if the state is
  // FAILED, this field may explain why the synchronization with the identity provider failed.
  optional string message = 2;

  // List of user IDs that have been successfully synced to the identity provider. This tracks which users
  // currently have the role assigned, allowing the controller to detect when users are added or removed from
  // the membership.
  repeated string users = 3;
}

// Describes the state of a project membership.
enum ProjectMembershipState {
  // Default value, should not be used.
  PROJECT_MEMBERSHIP_STATE_UNSPECIFIED = 0;

  // The project membership is pending synchronization with the identity provider.
  PROJECT_MEMBERSHIP_STATE_PENDING = 1;

  // The project membership is ready and the member has the specified permissions.
  PROJECT_MEMBERSHIP_STATE_READY = 2;

  // The project membership failed to synchronize with the identity provider.
  PROJECT_MEMBERSHIP_STATE_FAILED = 3;
}
