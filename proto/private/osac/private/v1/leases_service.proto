syntax = "proto3";

package osac.private.v1;

import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "osac/private/v1/lease_type.proto";

// Request message for listing leases.
message LeasesListRequest {
  optional int32 offset = 1;
  optional int32 limit = 2;
  optional string filter = 3;
}

// Response message for listing leases.
message LeasesListResponse {
  int32 size = 1;
  int32 total = 2;
  repeated Lease items = 3;
}

// Request message for getting a lease by identifier.
message LeasesGetRequest {
  string id = 1;
}

// Response message for getting a lease.
message LeasesGetResponse {
  Lease object = 1;
}

// Request message for creating a lease.
message LeasesCreateRequest {
  Lease object = 1;
}

// Response message for creating a lease.
message LeasesCreateResponse {
  Lease object = 1;
}

// Request message for deleting a lease.
message LeasesDeleteRequest {
  string id = 1;
}

// Response message for deleting a lease.
message LeasesDeleteResponse {}

// Request message for updating a lease.
message LeasesUpdateRequest {
  Lease object = 1;
  google.protobuf.FieldMask update_mask = 2;

  // Lock enables optimistic locking. When set to true, the server verifies that the current version of the object
  // matches the value of the metadata.version field of the submitted object. If they differ the update will be
  // rejected. This is useful to prevent lost updates when multiple clients are modifying the same object concurrently.
  bool lock = 3;
}

// Response message for updating a lease.
message LeasesUpdateResponse {
  Lease object = 1;
}

// Request message for signaling a lease.
message LeasesSignalRequest {
  string id = 1;
}

// Response message for signaling a lease.
message LeasesSignalResponse {}

// Leases provides operations for managing lease objects used for distributed coordination such as leader election.
service Leases {
  // List returns a paginated list of leases, optionally filtered by a CEL expression.
  rpc List(LeasesListRequest) returns (LeasesListResponse) {
    option (google.api.http) = {get: "/api/private/v1/leases"};
  }

  // Get returns a single lease by its identifier.
  rpc Get(LeasesGetRequest) returns (LeasesGetResponse) {
    option (google.api.http) = {
      get: "/api/private/v1/leases/{id}"
      response_body: "object"
    };
  }

  // Create creates a new lease.
  rpc Create(LeasesCreateRequest) returns (LeasesCreateResponse) {
    option (google.api.http) = {
      post: "/api/private/v1/leases"
      body: "object"
      response_body: "object"
    };
  }

  // Delete deletes a lease by its identifier.
  rpc Delete(LeasesDeleteRequest) returns (LeasesDeleteResponse) {
    option (google.api.http) = {delete: "/api/private/v1/leases/{id}"};
  }

  // Update updates an existing lease. The update mask controls which fields are modified.
  rpc Update(LeasesUpdateRequest) returns (LeasesUpdateResponse) {
    option (google.api.http) = {
      patch: "/api/private/v1/leases/{object.id}"
      body: "object"
      response_body: "object"
    };
  }

  // Signal indicates that something changed in the lease or the system that may require reconciling the lease.
  rpc Signal(LeasesSignalRequest) returns (LeasesSignalResponse) {}
}
