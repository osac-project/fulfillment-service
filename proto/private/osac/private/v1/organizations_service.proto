syntax = "proto3";

package osac.private.v1;

import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "osac/private/v1/organization_type.proto";

message OrganizationsListRequest {
  optional int32 offset = 1;
  optional int32 limit = 2;
  optional string filter = 3;
}

message OrganizationsListResponse {
  int32 size = 1;
  int32 total = 2;
  repeated Organization items = 3;
}

message OrganizationsGetRequest {
  string id = 1;
}

message OrganizationsGetResponse {
  Organization object = 1;
}

message OrganizationsCreateRequest {
  Organization object = 1;
}

message OrganizationsCreateResponse {
  Organization object = 1;
}

message OrganizationsDeleteRequest {
  string id = 1;
}

message OrganizationsDeleteResponse {}

message OrganizationsUpdateRequest {
  Organization object = 1;
  google.protobuf.FieldMask update_mask = 2;

  // Lock enables optimistic locking. When set to true, the server verifies that the current version of the object
  // matches the value of the metadata.version field of the submitted object. If they differ the update will be
  // rejected. This is useful to prevent lost updates when multiple clients are modifying the same object concurrently.
  bool lock = 3;
}

message OrganizationsUpdateResponse {
  Organization object = 1;
}

message OrganizationsSignalRequest {
  string id = 1;
}

message OrganizationsSignalResponse {}

service Organizations {
  rpc List(OrganizationsListRequest) returns (OrganizationsListResponse) {
    option (google.api.http) = {get: "/api/private/v1/organizations"};
  }
  rpc Get(OrganizationsGetRequest) returns (OrganizationsGetResponse) {
    option (google.api.http) = {
      get: "/api/private/v1/organizations/{id}"
      response_body: "object"
    };
  }
  rpc Create(OrganizationsCreateRequest) returns (OrganizationsCreateResponse) {
    option (google.api.http) = {
      post: "/api/private/v1/organizations"
      body: "object"
      response_body: "object"
    };
  }
  rpc Delete(OrganizationsDeleteRequest) returns (OrganizationsDeleteResponse) {
    option (google.api.http) = {delete: "/api/private/v1/organizations/{id}"};
  }
  rpc Update(OrganizationsUpdateRequest) returns (OrganizationsUpdateResponse) {
    option (google.api.http) = {
      patch: "/api/private/v1/organizations/{object.id}"
      body: "object"
      response_body: "object"
    };
  }

  // Indicates that something changed in the object or the system that may require reconciling the object.
  rpc Signal(OrganizationsSignalRequest) returns (OrganizationsSignalResponse) {}
}
