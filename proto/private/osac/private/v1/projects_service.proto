syntax = "proto3";

package osac.private.v1;

import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "osac/private/v1/project_type.proto";

// Request to list projects with optional pagination and filtering.
message ProjectsListRequest {
  // Index of the first result. If not specified the default value will be zero.
  optional int32 offset = 1;

  // Maximum number of results to be returned by the server. When not specified all the results will be returned. Note
  // that there may not be enough results to return, and that the server may decide, for performance reasons, to return
  // less results than requested.
  optional int32 limit = 2;

  // Filter criteria.
  //
  // The value of this parameter is a [CEL](https://cel.dev) expression used to select which objects to return. The
  // built-in `this` variable refers to the object being tested and `now` refers to the current date and time. If the
  // expression evaluates to `true` the object is included in the results. For example, to retrieve only top-level
  // projects (no parent):
  //
  //     this.metadata.project == ""
  //
  // To retrieve child projects of a specific parent by name:
  //
  //     this.metadata.project == "team-a"
  //
  // To retrieve projects with a specific label:
  //
  //     this.metadata.labels["env"] == "production"
  //
  // If this isn't provided, or if the value is empty, then all the projects will be returned. Not all CEL constructs
  // are currently supported for implementation reasons; see the filter documentation (docs/FILTER.md) for the full
  // details.
  optional string filter = 3;

  // Order criteria.
  optional string order = 4;
}

// Response containing a paginated list of projects.
message ProjectsListResponse {
  // Actual number of items returned in this response.
  int32 size = 1;

  // Total number of items in the collection that match the search criteria, regardless of pagination.
  int32 total = 2;

  // The projects that match the request criteria, limited by pagination parameters.
  repeated Project items = 3;
}

// Request to retrieve a single project by ID.
message ProjectsGetRequest {
  // Unique identifier of the project to retrieve.
  string id = 1;
}

// Response containing the requested project.
message ProjectsGetResponse {
  // The requested project object.
  Project object = 1;
}

// Request to create a new project.
message ProjectsCreateRequest {
  // The project to create. The server will populate the ID and system-managed fields.
  Project object = 1;

  // When true, the server validates the request and returns the fully resolved object
  // without persisting it or triggering any side effects.
  bool dry_run = 2;
}

// Response containing the newly created project.
message ProjectsCreateResponse {
  // The created project with server-populated fields (ID, timestamps, status, etc.).
  Project object = 1;
}

// Request to update an existing project.
message ProjectsUpdateRequest {
  // The project with updated fields. The ID must match an existing project.
  Project object = 1;

  // Field mask indicating which fields to update. If not provided, all fields are updated.
  // Only fields specified in the mask will be modified. Nested fields can be specified using dot notation.
  // Example: "metadata.labels", "spec.description"
  google.protobuf.FieldMask update_mask = 2;

  // Lock enables optimistic locking. When set to true, the server verifies that the current version of the object
  // matches the value of the metadata.version field of the submitted object. If they differ the update will be
  // rejected. This is useful to prevent lost updates when multiple clients are modifying the same object concurrently.
  bool lock = 3;
}

// Response containing the updated project.
message ProjectsUpdateResponse {
  // The updated project object with incremented version number.
  Project object = 1;
}

// Request to delete a project.
message ProjectsDeleteRequest {
  // Unique identifier of the project to delete.
  string id = 1;
}

// Response for a successful project deletion.
message ProjectsDeleteResponse {}

// Request to signal a project for reconciliation.
message ProjectsSignalRequest {
  // Unique identifier of the project to signal for reconciliation.
  string id = 1;
}

// Response for a successful signal operation.
message ProjectsSignalResponse {}

service Projects {
  // Retrieves the list of projects.
  rpc List(ProjectsListRequest) returns (ProjectsListResponse) {
    option (google.api.http) = {get: "/api/private/v1/projects"};
  }

  // Retrieves the details of one specific project.
  rpc Get(ProjectsGetRequest) returns (ProjectsGetResponse) {
    option (google.api.http) = {
      get: "/api/private/v1/projects/{id}"
      response_body: "object"
    };
  }

  // Creates a new project.
  rpc Create(ProjectsCreateRequest) returns (ProjectsCreateResponse) {
    option (google.api.http) = {
      post: "/api/private/v1/projects"
      body: "object"
      response_body: "object"
    };
  }

  // Updates an existing project.
  rpc Update(ProjectsUpdateRequest) returns (ProjectsUpdateResponse) {
    option (google.api.http) = {
      patch: "/api/private/v1/projects/{object.id}"
      body: "object"
      response_body: "object"
    };
  }

  // Deletes a project.
  rpc Delete(ProjectsDeleteRequest) returns (ProjectsDeleteResponse) {
    option (google.api.http) = {delete: "/api/private/v1/projects/{id}"};
  }

  // Signals a project for reconciliation.
  //
  // This method is used by controllers to trigger reconciliation of a project's state.
  // It does not modify the project directly but notifies the system to re-evaluate
  // the project's status based on its current spec and external dependencies.
  rpc Signal(ProjectsSignalRequest) returns (ProjectsSignalResponse) {}
}
