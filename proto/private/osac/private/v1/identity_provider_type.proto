syntax = "proto3";

package osac.private.v1;

import "google/protobuf/timestamp.proto";
import "osac/private/v1/condition_status_type.proto";
import "osac/private/v1/metadata_type.proto";

// IdentityProvider represents an external identity provider configuration.
// Identity providers enable users to authenticate using their existing corporate credentials
// (LDAP, Active Directory, OIDC, SAML, etc.).
message IdentityProvider {
  // Unique name identifier for this IdP. Immutable after creation.
  // Must be URL-safe and unique
  string name = 1;

  // Metadata contains common object metadata.
  Metadata metadata = 2;

  // Spec is the desired state of the identity provider.
  IdentityProviderSpec spec = 3;

  // Status is the observed state of the identity provider.
  IdentityProviderStatus status = 4;
}

// IdentityProviderSpec represents the desired state of an identity provider.
message IdentityProviderSpec {
  // Human-friendly short title for this IdP, suitable for displaying in a single line.
  // Example: "Corporate LDAP" or "GitHub SSO"
  string title = 1;

  // Human-friendly description explaining the purpose or scope of this IdP.
  // Example: "Primary LDAP server for employee authentication"
  optional string description = 2;

  // Enabled indicates whether this IdP should be active and available for authentication.
  bool enabled = 3;

  // Provider-specific configuration settings.
  // The type of identity provider is determined by which config field is set.
  oneof config {
    // Configuration for OpenID Connect providers.
    OidcConfig oidc = 4;

    // Configuration for LDAP providers.
    LdapConfig ldap = 5;
  }
}

// OidcConfig contains configuration for OpenID Connect identity providers.
message OidcConfig {
  // Authorization endpoint URL where users are redirected to authenticate.
  // Example: "https://accounts.google.com/o/oauth2/v2/auth"
  string authorization_url = 1;

  // Token endpoint URL used to exchange authorization codes for access tokens.
  // Example: "https://oauth2.googleapis.com/token"
  string token_url = 2;

  // Client identifier issued by the OIDC provider.
  // This is a public identifier for the application.
  string client_id = 3;

  // Client secret for authenticating with the OIDC provider.
  // This field is write-only and will never be returned in API responses.
  string client_secret = 4;

  // Issuer URL that identifies the OIDC provider.
  // Used for validating ID tokens. Must match the 'iss' claim in tokens.
  // Example: "https://accounts.google.com"
  string issuer = 5;

  // Space-separated list of OAuth scopes to request.
  // Common scopes: "openid profile email"
  // Default: "openid profile email"
  optional string default_scopes = 6;

  // UserInfo endpoint URL for retrieving user profile information.
  // If not specified, user info will be extracted from the ID token.
  // Example: "https://openidconnect.googleapis.com/v1/userinfo"
  optional string user_info_url = 7;

  // JSON Web Key Set (JWKS) URL for obtaining public keys to verify ID token signatures.
  // If not specified, the provider's discovery endpoint will be used.
  // Example: "https://www.googleapis.com/oauth2/v3/certs"
  optional string jwks_url = 8;

  // Whether to validate ID token signatures using JWKS.
  // Default: true
  optional bool validate_signature = 9;

  // Logout URL where users are redirected after logging out.
  // Example: "https://accounts.google.com/logout"
  optional string logout_url = 10;
}

// LdapConfig contains configuration for LDAP identity providers.
message LdapConfig {
  // Connection URL for the LDAP server.
  // Supports ldap:// and ldaps:// (SSL/TLS) protocols.
  // Example: "ldap://ldap.example.com:389" or "ldaps://ldap.example.com:636"
  string connection_url = 1;

  // Distinguished Name (DN) of the user to bind as for authenticating to the LDAP server.
  // This user must have permissions to search for users in the directory.
  // Example: "cn=admin,dc=example,dc=com"
  string bind_dn = 2;

  // Password for the bind DN user.
  // This field is write-only and will never be returned in API responses.
  string bind_credential = 3;

  // Base Distinguished Name where user entries are located in the LDAP directory.
  // All user searches will be performed under this DN.
  // Example: "ou=users,dc=example,dc=com"
  string users_dn = 4;

  // LDAP attribute to use as the username for authentication.
  // Common values: "uid", "cn", "sAMAccountName" (Active Directory)
  // Default: "uid"
  optional string username_ldap_attribute = 5;

  // LDAP attribute containing the user's RDN (Relative Distinguished Name).
  // Used to construct the full DN when authenticating users.
  // Common values: "uid", "cn"
  // Default: "uid"
  optional string rdn_ldap_attribute = 6;

  // LDAP attribute containing the user's unique identifier.
  // Maps to the user ID in the application.
  // Common values: "uid", "entryUUID", "objectGUID" (Active Directory)
  // Default: "uid"
  optional string uuid_ldap_attribute = 7;

  // LDAP filter to apply when searching for users.
  // Must return users to be allowed to authenticate.
  // Example: "(objectClass=person)"
  optional string user_object_classes = 8;

  // Authentication type to use when binding.
  // Valid values: "simple" (username/password), "none" (anonymous)
  // Default: "simple"
  optional string auth_type = 9;

  // LDAP server vendor for vendor-specific optimizations.
  // Valid values: "ad" (Active Directory), "rhds" (Red Hat Directory Server),
  // "tivoli" (IBM Tivoli), "edirectory" (Novell eDirectory), "other"
  // Default: "other"
  optional string vendor = 10;

  // Whether to use STARTTLS to upgrade the connection to TLS.
  // Only applicable for ldap:// URLs (not ldaps://).
  // Default: false
  optional bool use_truststore_spi = 11;

  // Whether to enable pagination when searching for users.
  // Useful for large directories to avoid timeouts.
  // Default: true
  optional bool pagination = 12;
}

// IdentityProviderPhase represents the current phase of an identity provider.
enum IdentityProviderPhase {
  // IDENTITY_PROVIDER_PHASE_UNSPECIFIED is the default value.
  IDENTITY_PROVIDER_PHASE_UNSPECIFIED = 0;

  // IDENTITY_PROVIDER_PHASE_READY indicates the IdP is ready and operational.
  IDENTITY_PROVIDER_PHASE_READY = 1;

  // IDENTITY_PROVIDER_PHASE_ERROR indicates the IdP is in an error state.
  IDENTITY_PROVIDER_PHASE_ERROR = 2;

  // IDENTITY_PROVIDER_PHASE_UNKNOWN indicates the IdP state is unknown.
  IDENTITY_PROVIDER_PHASE_UNKNOWN = 3;
}

// IdentityProviderStatus represents the operational status of an identity provider.
message IdentityProviderStatus {
  // Phase represents the current phase of the identity provider.
  IdentityProviderPhase phase = 1;

  // Message provides additional context about the current status.
  string message = 2;

  // Conditions represent specific aspects of the identity provider's status.
  repeated IdentityProviderCondition conditions = 3;
}

// IdentityProviderCondition represents a specific condition of the identity provider.
message IdentityProviderCondition {
  // Type of condition. Examples: "Reachable", "Configured", "Authenticated"
  string type = 1;

  // Status of the condition.
  ConditionStatus status = 2;

  // Reason is a brief machine-readable explanation for the condition's status.
  string reason = 3;

  // Message is a human-readable explanation for the condition's status.
  string message = 4;

  // LastTransitionTime is the last time the condition transitioned from one status to another.
  google.protobuf.Timestamp last_transition_time = 5;
}
