syntax = "proto3";

package osac.private.v1;

import "google/api/field_behavior.proto";
import "osac/private/v1/metadata_type.proto";

// Represents a binding between a PublicIP and a target resource (e.g., a ComputeInstance).
//
// A PublicIPAttachment is a first-class resource that manages the attach/detach lifecycle
// independently from the PublicIP allocation lifecycle. Creating a PublicIPAttachment triggers
// the attach workflow; deleting it triggers the detach workflow.
//
// The binding is immutable: to change the target, delete the attachment and create a new one.
// The oneof target field supports future target types (Cluster, BareMetalServer) without
// breaking changes.
//
// Lifecycle: PENDING (attach in progress) -> READY (attached and routing traffic) -> DELETING
// (detach in progress). FAILED is a terminal error state that retries via the standard
// provisioning lifecycle with exponential backoff.
message PublicIPAttachment {
  // Unique identifier of the public IP attachment.
  string id = 1;

  // Metadata of the public IP attachment, including name, labels, and timestamps.
  Metadata metadata = 2;

  // Desired configuration of the public IP attachment (user-specified).
  PublicIPAttachmentSpec spec = 3;

  // Current state of the public IP attachment (system-provided, read-only).
  PublicIPAttachmentStatus status = 4;
}

// Defines the desired configuration for a PublicIPAttachment.
//
// Both fields are required and immutable after creation. The public_ip must reference an
// existing PublicIP in ALLOCATED state. The target must reference a valid resource that
// supports public IP attachment.
message PublicIPAttachmentSpec {
  // PublicIP ID to attach. Required and immutable after creation.
  //
  // Must reference the ID of an existing PublicIP in ALLOCATED state that is not already
  // attached (status.attached == false). Only one PublicIPAttachment may exist per PublicIP.
  //
  // Example: "019728a4-3f5c-7def-8abc-1234567890ab"
  string public_ip = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.field_behavior) = IMMUTABLE
  ];

  // Target resource to attach the public IP to. Exactly one target field must be set.
  // Required and immutable after creation.
  oneof target {
    // ComputeInstance ID to attach this public IP to.
    //
    // Must reference the ID of an existing ComputeInstance in RUNNING state. Only one
    // PublicIPAttachment may exist per ComputeInstance.
    //
    // Example: "01972f1b-a4e9-7c82-9def-abcdef123456"
    string compute_instance = 2;
  }
}

// Represents the current operational state of a PublicIPAttachment.
//
// Status is system-provided and read-only. Users cannot modify status fields directly; the
// system updates them based on reconciliation of the spec and feedback from the cluster
// controller.
message PublicIPAttachmentStatus {
  // Current lifecycle state of the public IP attachment.
  PublicIPAttachmentState state = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Allocated IP address from the parent PublicIP.
  //
  // Populated for convenience once the attachment reaches READY state. Mirrors the address
  // field from the referenced PublicIP's status.
  string public_ip_address = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Human-readable message providing additional details about the current state.
  //
  // For PENDING state, may contain progress information. For FAILED state, contains the
  // error details. Typically empty for READY state.
  optional string message = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Identifier of the hub cluster that this public IP attachment is deployed to.
  //
  // Set by the fulfillment-service controller when reconciling the attachment to a
  // Kubernetes CR on the target hub cluster.
  string hub = 4 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Lifecycle states for PublicIPAttachment resources.
//
// State transitions: UNSPECIFIED -> PENDING -> READY. On deletion: READY -> DELETING.
// FAILED can occur from PENDING and retries automatically via the provisioning lifecycle.
enum PublicIPAttachmentState {
  // State is unknown or has not been determined yet.
  PUBLIC_IP_ATTACHMENT_STATE_UNSPECIFIED = 0;

  // The attachment is being provisioned (attach AAP job in progress).
  //
  // The system is binding the PublicIP's allocated address to the target resource. This
  // involves creating the MetalLB LoadBalancer Service in the target's namespace and
  // configuring routing.
  PUBLIC_IP_ATTACHMENT_STATE_PENDING = 1;

  // The attachment is active and the target is reachable via the public IP address.
  //
  // The PublicIP's allocated address is bound to the target resource and actively routing
  // traffic. The parent PublicIP's status.attached is set to true.
  PUBLIC_IP_ATTACHMENT_STATE_READY = 2;

  // The attachment failed. Check status.message for error details.
  //
  // The provisioning lifecycle retries automatically with exponential backoff. Unlike the
  // previous inline attach/detach model, failed attachments do not create dead ends.
  PUBLIC_IP_ATTACHMENT_STATE_FAILED = 3;

  // The attachment is being deprovisioned (detach AAP job in progress).
  //
  // Triggered by deletion of the PublicIPAttachment resource. The system unbinds the
  // address from the target and moves the MetalLB Service back to the parking namespace.
  // On completion, the parent PublicIP's status.attached is set to false.
  PUBLIC_IP_ATTACHMENT_STATE_DELETING = 4;
}
