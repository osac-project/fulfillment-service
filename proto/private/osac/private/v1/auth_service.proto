syntax = "proto3";

package osac.private.v1;

import "google/api/annotations.proto";
import "osac/private/v1/auth_type.proto";

service Auth {
  // Authenticates a user with username and password.
  // Returns JWT access token and refresh token.
  rpc Login(LoginRequest) returns (LoginResponse) {
    option (google.api.http) = {
      post: "/api/private/v1/organizations/{organization_id}/auth/login"
      body: "*"
    };
  }

  // Refreshes an access token using a refresh token.
  // Returns new JWT access token and refresh token.
  rpc Refresh(RefreshRequest) returns (RefreshResponse) {
    option (google.api.http) = {
      post: "/api/private/v1/organizations/{organization_id}/auth/refresh"
      body: "*"
    };
  }

  // Logs out a user by invalidating their refresh token.
  rpc Logout(LogoutRequest) returns (LogoutResponse) {
    option (google.api.http) = {
      post: "/api/private/v1/organizations/{organization_id}/auth/logout"
      body: "*"
    };
  }
}
