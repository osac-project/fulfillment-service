syntax = "proto3";

package osac.private.v1;

import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "osac/private/v1/public_ip_pool_type.proto";

message PublicIPPoolsListRequest {
  // Index of the first result. If not specified the default value will be zero.
  optional int32 offset = 1;

  // Maximum number of results to be returned by the server. When not specified all the results will be returned. Note
  // that there may not be enough results to return, and that the server may decide, for performance reasons, to return
  // less results than requested.
  optional int32 limit = 2;

  // Filter criteria.
  //
  // The value of this parameter is a [CEL](https://cel.dev) expression used to select which objects to return. The
  // built-in `this` variable refers to the object being tested and `now` refers to the current date and time. If the
  // expression evaluates to `true` the object is included in the results. For example, to retrieve all IPv4 public
  // IP pools:
  //
  //     this.spec.ip_family == IP_FAMILY_IPV4
  //
  // If this isn't provided, or if the value is empty, then all the public IP pools that the user has permission to see
  // will be returned. Not all CEL constructs are currently supported for implementation reasons; see the filter
  // documentation (docs/FILTER.md) for the full details.
  optional string filter = 3;

  // Order criteria.
  //
  // The syntax of this parameter is similar to the syntax of the _order by_ clause of a SQL statement, but using the
  // names of the attributes of the public IP pool instead of the names of the columns of a table. For example, in
  // order to sort the pools descending by creation time the value should be:
  //
  //     metadata.created_at desc
  //
  // If the parameter isn't provided, or if the value is empty, then the order of the results is undefined.
  optional string order = 4;
}

message PublicIPPoolsListResponse {
  // Actual number of items returned. Note that this may be smaller than the value requested in the `limit` parameter
  // of the request if there are not enough items, or if the system decides that returning that number of items isn't
  // feasible or convenient for performance reasons.
  int32 size = 1;

  // Total number of items of the collection that match the search criteria, regardless of the number of results
  // requested with the `limit` parameter.
  int32 total = 2;

  // List of results.
  repeated PublicIPPool items = 3;
}

message PublicIPPoolsGetRequest {
  string id = 1;
}

message PublicIPPoolsGetResponse {
  PublicIPPool object = 1;
}

message PublicIPPoolsCreateRequest {
  PublicIPPool object = 1;

  // When true, the server validates the request and returns the fully resolved object
  // without persisting it or triggering any side effects.
  bool dry_run = 2;
}

message PublicIPPoolsCreateResponse {
  PublicIPPool object = 1;
}

message PublicIPPoolsUpdateRequest {
  PublicIPPool object = 1;
  google.protobuf.FieldMask update_mask = 2;

  // Lock enables optimistic locking. When set to true, the server verifies that the current version of the object
  // matches the value of the metadata.version field of the submitted object. If they differ the update will be
  // rejected. This is useful to prevent lost updates when multiple clients are modifying the same object concurrently.
  bool lock = 3;
}

message PublicIPPoolsUpdateResponse {
  PublicIPPool object = 1;
}

message PublicIPPoolsDeleteRequest {
  string id = 1;
}

message PublicIPPoolsDeleteResponse {}

message PublicIPPoolsSignalRequest {
  string id = 1;
}

message PublicIPPoolsSignalResponse {}

service PublicIPPools {
  // Retrieves the list of public IP pools.
  rpc List(PublicIPPoolsListRequest) returns (PublicIPPoolsListResponse) {
    option (google.api.http) = {get: "/api/private/v1/public_ip_pools"};
  }

  // Retrieves the details of one specific public IP pool.
  rpc Get(PublicIPPoolsGetRequest) returns (PublicIPPoolsGetResponse) {
    option (google.api.http) = {
      get: "/api/private/v1/public_ip_pools/{id}"
      response_body: "object"
    };
  }

  // Creates a new public IP pool.
  rpc Create(PublicIPPoolsCreateRequest) returns (PublicIPPoolsCreateResponse) {
    option (google.api.http) = {
      post: "/api/private/v1/public_ip_pools"
      body: "object"
      response_body: "object"
    };
  }

  // Updates an existing public IP pool. Only metadata fields (name, labels, annotations) are mutable.
  // All spec fields (cidrs, ip_family, implementation_strategy) are immutable after creation.
  rpc Update(PublicIPPoolsUpdateRequest) returns (PublicIPPoolsUpdateResponse) {
    option (google.api.http) = {
      patch: "/api/private/v1/public_ip_pools/{object.id}"
      body: "object"
      response_body: "object"
    };
  }

  // Deletes a public IP pool. Rejected if allocated PublicIPs still reference this pool.
  rpc Delete(PublicIPPoolsDeleteRequest) returns (PublicIPPoolsDeleteResponse) {
    option (google.api.http) = {delete: "/api/private/v1/public_ip_pools/{id}"};
  }

  // Indicates that something changed in the object or the system that may require reconciling the object.
  rpc Signal(PublicIPPoolsSignalRequest) returns (PublicIPPoolsSignalResponse) {
  }
}
