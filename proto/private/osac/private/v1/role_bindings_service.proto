syntax = "proto3";

package osac.private.v1;

import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "osac/private/v1/role_binding_type.proto";

// Request message for listing role bindings.
message RoleBindingsListRequest {
  // Index of the first result. If not specified the default value will be zero.
  optional int32 offset = 1;

  // Maximum number of results to be returned by the server. When not specified all the results will be returned. Note
  // that there may not be enough results to return, and that the server may decide, for performance reasons, to return
  // less results than requested.
  optional int32 limit = 2;

  // Filter criteria.
  //
  // The value of this parameter is a [CEL](https://cel.dev) expression used to select which objects to return. The
  // built-in `this` variable refers to the object being tested and `now` refers to the current date and time. If the
  // expression evaluates to `true` the object is included in the results. For example, to retrieve all role bindings
  // for a specific role:
  //
  //     this.spec.role == "019dd9f6-36cb-7824-ac1c-6455d8a7a9b5"
  //
  // If this isn't provided, or if the value is empty, then all the role bindings that the user has permission to see
  // will be returned. Not all CEL constructs are currently supported for implementation reasons; see the filter
  // documentation (docs/FILTER.md) for the full details.
  optional string filter = 3;

  // Order criteria.
  //
  // The syntax of this parameter is similar to the syntax of the _order by_ clause of a SQL statement, but using the
  // names of the attributes of the role binding instead of the names of the columns of a table. For example, in order
  // to sort the role bindings descending by name the value should be:
  //
  //     metadata.name desc
  //
  // If the parameter isn't provided, or if the value is empty, then the order of the results is undefined.
  optional string order = 4;
}

// Response message for listing role bindings.
message RoleBindingsListResponse {
  // Actual number of items returned. Note that this may be smaller than the value requested in the `limit` parameter
  // of the request if there are not enough items, or if the system decides that returning that number of items isn't
  // feasible or convenient for performance reasons.
  int32 size = 1;

  // Total number of items of the collection that match the search criteria, regardless of the number of results
  // requested with the `limit` parameter.
  int32 total = 2;

  // List of results.
  repeated RoleBinding items = 3;
}

// Request message for getting a single role binding.
message RoleBindingsGetRequest {
  // Unique identifier of the role binding to retrieve.
  string id = 1;
}

// Response message for getting a single role binding.
message RoleBindingsGetResponse {
  // The requested role binding object.
  RoleBinding object = 1;
}

// Request message for creating a new role binding.
message RoleBindingsCreateRequest {
  // The role binding object to create.
  RoleBinding object = 1;
}

// Response message for creating a new role binding.
message RoleBindingsCreateResponse {
  // The created role binding object, including any server-generated fields.
  RoleBinding object = 1;
}

// Request message for updating an existing role binding.
message RoleBindingsUpdateRequest {
  // The role binding object with updated fields.
  RoleBinding object = 1;

  // Field mask specifying which fields to update. If not provided, all fields will be updated.
  google.protobuf.FieldMask update_mask = 2;

  // Lock enables optimistic locking. When set to true, the server verifies that the current version of the object
  // matches the value of the metadata.version field of the submitted object. If they differ the update will be
  // rejected. This is useful to prevent lost updates when multiple clients are modifying the same object concurrently.
  bool lock = 3;
}

// Response message for updating an existing role binding.
message RoleBindingsUpdateResponse {
  // The updated role binding object.
  RoleBinding object = 1;
}

// Request message for deleting a role binding.
message RoleBindingsDeleteRequest {
  // Unique identifier of the role binding to delete.
  string id = 1;
}

// Response message for deleting a role binding.
message RoleBindingsDeleteResponse {}

// Request message for signaling a role binding.
message RoleBindingsSignalRequest {
  // Unique identifier of the role binding to signal.
  string id = 1;
}

// Response message for signaling a role binding.
message RoleBindingsSignalResponse {}

// Service for managing role bindings.
//
// Role bindings grant the permissions defined by a role to a set of users. Only administrators can create, update,
// or delete role bindings.
service RoleBindings {
  // Retrieves the list of role bindings.
  rpc List(RoleBindingsListRequest) returns (RoleBindingsListResponse) {
    option (google.api.http) = {get: "/api/private/v1/role_bindings"};
  }

  // Retrieves the details of one specific role binding.
  rpc Get(RoleBindingsGetRequest) returns (RoleBindingsGetResponse) {
    option (google.api.http) = {
      get: "/api/private/v1/role_bindings/{id}"
      response_body: "object"
    };
  }

  // Creates a new role binding.
  rpc Create(RoleBindingsCreateRequest) returns (RoleBindingsCreateResponse) {
    option (google.api.http) = {
      post: "/api/private/v1/role_bindings"
      body: "object"
      response_body: "object"
    };
  }

  // Updates an existing role binding.
  rpc Update(RoleBindingsUpdateRequest) returns (RoleBindingsUpdateResponse) {
    option (google.api.http) = {
      patch: "/api/private/v1/role_bindings/{object.id}"
      body: "object"
      response_body: "object"
    };
  }

  // Deletes a role binding.
  rpc Delete(RoleBindingsDeleteRequest) returns (RoleBindingsDeleteResponse) {
    option (google.api.http) = {delete: "/api/private/v1/role_bindings/{id}"};
  }

  // Indicates that something changed in the object or the system that may require reconciling the object.
  rpc Signal(RoleBindingsSignalRequest) returns (RoleBindingsSignalResponse) {
  }
}
