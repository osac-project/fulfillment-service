syntax = "proto3";

package osac.private.v1;

import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "osac/private/v1/baremetal_instance_template_type.proto";

message BareMetalInstanceTemplatesListRequest {
  optional int32 offset = 1;
  optional int32 limit = 2;
  optional string filter = 3;
  optional string order = 4;
}

message BareMetalInstanceTemplatesListResponse {
  int32 size = 1;
  int32 total = 2;
  repeated BareMetalInstanceTemplate items = 3;
}

message BareMetalInstanceTemplatesGetRequest {
  // Unique identifier of the template.
  string id = 1;
}

message BareMetalInstanceTemplatesGetResponse {
  BareMetalInstanceTemplate object = 1;
}

message BareMetalInstanceTemplatesCreateRequest {
  BareMetalInstanceTemplate object = 1;
}

message BareMetalInstanceTemplatesCreateResponse {
  BareMetalInstanceTemplate object = 1;
}

message BareMetalInstanceTemplatesUpdateRequest {
  BareMetalInstanceTemplate object = 1;
  google.protobuf.FieldMask update_mask = 2;

  // Lock enables optimistic locking. When set to true, the server verifies that the current version of the object
  // matches the value of the metadata.version field of the submitted object. If they differ the update will be
  // rejected. This is useful to prevent lost updates when multiple clients are modifying the same object concurrently.
  bool lock = 3;
}

message BareMetalInstanceTemplatesUpdateResponse {
  BareMetalInstanceTemplate object = 1;
}

message BareMetalInstanceTemplatesDeleteRequest {
  // Unique identifier of the template.
  string id = 1;
}

message BareMetalInstanceTemplatesDeleteResponse {}

message BareMetalInstanceTemplatesSignalRequest {
  // Unique identifier of the template.
  string id = 1;
}

message BareMetalInstanceTemplatesSignalResponse {}

service BareMetalInstanceTemplates {
  rpc List(BareMetalInstanceTemplatesListRequest) returns (BareMetalInstanceTemplatesListResponse) {
    option (google.api.http) = {get: "/api/private/v1/baremetal_instance_templates"};
  }
  rpc Get(BareMetalInstanceTemplatesGetRequest) returns (BareMetalInstanceTemplatesGetResponse) {
    option (google.api.http) = {
      get: "/api/private/v1/baremetal_instance_templates/{id}"
      response_body: "object"
    };
  }
  rpc Create(BareMetalInstanceTemplatesCreateRequest) returns (BareMetalInstanceTemplatesCreateResponse) {
    option (google.api.http) = {
      post: "/api/private/v1/baremetal_instance_templates"
      body: "object"
      response_body: "object"
    };
  }
  rpc Update(BareMetalInstanceTemplatesUpdateRequest) returns (BareMetalInstanceTemplatesUpdateResponse) {
    option (google.api.http) = {
      patch: "/api/private/v1/baremetal_instance_templates/{object.id}"
      body: "object"
      response_body: "object"
    };
  }
  rpc Delete(BareMetalInstanceTemplatesDeleteRequest) returns (BareMetalInstanceTemplatesDeleteResponse) {
    option (google.api.http) = {delete: "/api/private/v1/baremetal_instance_templates/{id}"};
  }

  // Indicates that something changed in the object or the system that may require reconciling the object.
  rpc Signal(BareMetalInstanceTemplatesSignalRequest) returns (BareMetalInstanceTemplatesSignalResponse) {}
}
