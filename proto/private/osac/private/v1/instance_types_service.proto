syntax = "proto3";

package osac.private.v1;

import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "osac/private/v1/instance_type_type.proto";

message InstanceTypesListRequest {
  optional int32 offset = 1;
  optional int32 limit = 2;
  optional string filter = 3;
  optional string order = 4;
}

message InstanceTypesListResponse {
  int32 size = 1;
  int32 total = 2;
  repeated InstanceType items = 3;
}

message InstanceTypesGetRequest {
  string id = 1;
}

message InstanceTypesGetResponse {
  InstanceType object = 1;
}

message InstanceTypesCreateRequest {
  InstanceType object = 1;

  // When true, the server validates the request and returns the fully resolved object
  // without persisting it or triggering any side effects.
  bool dry_run = 2;
}

message InstanceTypesCreateResponse {
  InstanceType object = 1;
}

message InstanceTypesUpdateRequest {
  InstanceType object = 1;
  google.protobuf.FieldMask update_mask = 2;

  // Lock enables optimistic locking. When set to true, the server verifies that the current version of the object
  // matches the value of the metadata.version field of the submitted object. If they differ the update will be
  // rejected. This is useful to prevent lost updates when multiple clients are modifying the same object concurrently.
  bool lock = 3;
}

message InstanceTypesUpdateResponse {
  InstanceType object = 1;
}

message InstanceTypesDeleteRequest {
  string id = 1;
}

message InstanceTypesDeleteResponse {}

message InstanceTypesSignalRequest {
  string id = 1;
}

message InstanceTypesSignalResponse {}

service InstanceTypes {
  rpc List(InstanceTypesListRequest) returns (InstanceTypesListResponse) {
    option (google.api.http) = {get: "/api/private/v1/instance_types"};
  }
  rpc Get(InstanceTypesGetRequest) returns (InstanceTypesGetResponse) {
    option (google.api.http) = {
      get: "/api/private/v1/instance_types/{id}"
      response_body: "object"
    };
  }
  rpc Create(InstanceTypesCreateRequest) returns (InstanceTypesCreateResponse) {
    option (google.api.http) = {
      post: "/api/private/v1/instance_types"
      body: "object"
      response_body: "object"
    };
  }
  rpc Update(InstanceTypesUpdateRequest) returns (InstanceTypesUpdateResponse) {
    option (google.api.http) = {
      patch: "/api/private/v1/instance_types/{object.id}"
      body: "object"
      response_body: "object"
    };
  }
  rpc Delete(InstanceTypesDeleteRequest) returns (InstanceTypesDeleteResponse) {
    option (google.api.http) = {delete: "/api/private/v1/instance_types/{id}"};
  }

  // Indicates that something changed in the object or the system that may require reconciling the object.
  rpc Signal(InstanceTypesSignalRequest) returns (InstanceTypesSignalResponse) {}
}
