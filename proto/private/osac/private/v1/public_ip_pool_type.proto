syntax = "proto3";

package osac.private.v1;

import "google/api/field_behavior.proto";
import "osac/private/v1/ip_family_type.proto";
import "osac/private/v1/metadata_type.proto";

// Represents a pool of public IP addresses available for allocation to compute instances.
//
// Each PublicIPPool supports a single IP family (IPv4 or IPv6). The pool contains one or more CIDR
// ranges from which individual PublicIP addresses are allocated. Pools are provider-managed
// resources created by administrators through the private API.
//
// The implementation_strategy field determines how IPs from this pool are advertised on the target
// cluster (e.g., MetalLB L2 mode). This field is set by the system and is not user-configurable.
//
// Capacity tracking fields in the status (total, allocated, available) reflect the current utilization
// of the pool across all its CIDR ranges.
message PublicIPPool {
  // Unique identifier of the public IP pool.
  string id = 1;

  // Metadata of the public IP pool, including name, labels, and timestamps.
  Metadata metadata = 2;

  // Desired configuration of the public IP pool (admin-specified).
  PublicIPPoolSpec spec = 3;

  // Current state of the public IP pool (system-provided, read-only).
  PublicIPPoolStatus status = 4;
}

// Defines the desired configuration for a PublicIPPool.
//
// All spec fields are immutable after creation. To change CIDRs, delete the pool and create a
// new one. The Update RPC only allows metadata changes (name, labels, annotations).
message PublicIPPoolSpec {
  // CIDR ranges for this pool. Required and immutable after creation.
  //
  // Each entry must be valid CIDR notation matching the declared ip_family. All CIDRs must be
  // the same IP family. CIDRs must not overlap with CIDRs in other pools.
  //
  // Example (IPv4): ["192.168.1.0/24", "10.0.5.0/28"]
  // Example (IPv6): ["2001:db8::/64"]
  repeated string cidrs = 2 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.field_behavior) = IMMUTABLE
  ];

  // IP address family for this pool. Required and immutable after creation.
  //
  // Determines whether the CIDRs in this pool are IPv4 or IPv6. All CIDRs must match this
  // family. A single pool cannot mix IPv4 and IPv6 ranges.
  IPFamily ip_family = 3 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.field_behavior) = IMMUTABLE
  ];

  // Backend strategy used to advertise IPs from this pool on the target cluster.
  //
  // Set by the system based on cluster configuration. Not user-configurable. Currently the
  // only supported strategy is "metallb-l2" (MetalLB Layer 2 advertisement mode).
  string implementation_strategy = 4 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.field_behavior) = IMMUTABLE
  ];
}

// Represents the current operational state of a PublicIPPool.
//
// Status is system-provided and read-only. Users cannot modify status fields directly; the system
// updates them based on reconciliation of the spec and feedback from the cluster controller.
message PublicIPPoolStatus {
  // Current lifecycle state of the public IP pool.
  PublicIPPoolState state = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Human-readable message providing additional details about the current state.
  //
  // For PENDING state, may contain progress information like "Waiting for MetalLB configuration".
  // For FAILED state, contains error details. For READY state, typically empty.
  optional string message = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Identifier of the hub cluster that this pool is deployed to.
  //
  // Set by the fulfillment-service controller when reconciling the pool to a Kubernetes CR on
  // the target hub cluster. Used for tracking which cluster the pool resources reside on.
  string hub = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Total number of usable IP addresses across all CIDRs in this pool.
  //
  // Calculated from the CIDR ranges (e.g., a /24 IPv4 CIDR yields 254 usable addresses,
  // excluding network and broadcast addresses). Uses int64 to accommodate large IPv6 CIDR
  // ranges whose address counts exceed int32 capacity.
  int64 total = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Number of IP addresses currently allocated to PublicIP resources from this pool.
  int64 allocated = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Number of IP addresses available for new allocations from this pool.
  //
  // Equal to total minus allocated.
  int64 available = 6 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Lifecycle states for PublicIPPool resources.
//
// State transitions typically follow: UNSPECIFIED -> PENDING -> READY, with FAILED as a terminal
// error state that may require user intervention or resource recreation.
//
// The CRD phase "Progressing" maps to PENDING at the proto level. This is consistent with all
// networking resources in the fulfillment-service (VirtualNetwork, Subnet, SecurityGroup,
// NetworkClass, HostClass). PENDING describes user-facing readiness ("not usable yet"), while
// the CRD phase describes controller activity ("reconciliation in progress").
enum PublicIPPoolState {
  // State is unknown or has not been determined yet. Default state before initialization.
  PUBLIC_IP_POOL_STATE_UNSPECIFIED = 0;

  // The pool is being provisioned and is not ready for IP allocation yet.
  //
  // During this state, the system is creating the MetalLB IPAddressPool on the target cluster
  // and configuring L2 advertisement. Maps from CRD phase "Progressing".
  PUBLIC_IP_POOL_STATE_PENDING = 1;

  // The pool is fully operational and ready for PublicIP allocation.
  //
  // MetalLB IPAddressPool is configured and L2 advertisement is active. PublicIPs can be
  // allocated from this pool's CIDR ranges. Maps from CRD phase "Ready".
  PUBLIC_IP_POOL_STATE_READY = 2;

  // The pool provisioning has failed.
  //
  // The status.message field contains error details. Common causes include MetalLB configuration
  // errors or cluster connectivity issues. Maps from CRD phase "Failed".
  PUBLIC_IP_POOL_STATE_FAILED = 3;

  // The pool is being deleted.
  //
  // During this state, the system is removing the MetalLB IPAddressPool and cleaning up
  // cluster resources. Deletion is rejected if allocated PublicIPs still reference this pool.
  // Maps from CRD phase "Deleting".
  PUBLIC_IP_POOL_STATE_DELETING = 4;

  // The pool deletion has failed.
  //
  // The deprovision operation encountered an error and could not complete. The status.message
  // field contains error details. Manual intervention may be required before retrying deletion.
  // No CRD phase equivalent (follows the Subnet pattern for proto-level tracking).
  PUBLIC_IP_POOL_STATE_DELETE_FAILED = 5;
}
