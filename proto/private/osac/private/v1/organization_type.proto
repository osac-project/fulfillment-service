syntax = "proto3";

package osac.private.v1;

import "osac/private/v1/metadata_type.proto";
import "osac/private/v1/break_glass_credentials_type.proto";

message Organization {
  string id = 1;
  Metadata metadata = 2;
  OrganizationSpec spec = 3;
  OrganizationStatus status = 4;
}

message OrganizationSpec {
  // List of e-mail domains associated with this organization.
  //
  // These are used to automatically redirect users to the correct identity provider during login. Each domain must be a
  // valid DNS hostname with only lowercase labels, for example `example.com` or `corp.example.org`. Uppercase letters
  // are rejected. Domains must be globally unique across all organizations.
  repeated string domains = 1;
}

// Represents the current operational state of an Organization.
//
// Status is system-provided and read-only. Users cannot modify status fields directly; the system updates them
// based on the reconciliation with the identity provider.
message OrganizationStatus {
  // Break-glass account credentials.
  // Only populated on successful creation. These credentials must be stored securely.
  // This field is not persisted and will be empty when reading existing organizations.
  BreakGlassCredentials break_glass_credentials = 1;

  // Current lifecycle state of the organization's IDP synchronization.
  OrganizationState state = 2;

  // Human-readable message providing additional details about the current state.
  //
  // For PENDING state, this might contain progress information like "Waiting for IDP sync" or
  // "Creating organization in identity provider".
  //
  // For FAILED state, this contains error details explaining what went wrong, such as "IDP connection timeout",
  // "Organization name already exists in IDP", or "Invalid organization name format".
  //
  // For SYNCED state, this is typically empty or contains confirmation like "Organization synced to IDP".
  optional string message = 3;

  // Name of the organization created in the identity provider.
  // Different providers use different terminology (Keycloak: realm, Auth0: tenant, Okta: organization),
  // but this field generically stores the IDP-side organization identifier.
  // Typically matches the organization name but stored here for reference.
  // This is set by the controller after successful IDP sync.
  // Empty string when state is PENDING or FAILED.
  string idp_organization_name = 4;

  // User ID of the break-glass account created in the identity provider.
  // This account has limited administrative permissions for managing users and identity providers.
  // The break-glass password is NOT stored here for security reasons - it is only returned once
  // during organization creation.
  // Empty string when state is PENDING or FAILED.
  string break_glass_user_id = 5;
}

// Lifecycle states for Organization resources.
//
// State transitions typically follow: UNSPECIFIED -> PENDING -> SYNCED, with FAILED as a terminal error state
// that may require user intervention or resource recreation.
enum OrganizationState {
  // State is unknown or has not been determined yet. This is the default state before initialization.
  ORGANIZATION_STATE_UNSPECIFIED = 0;

  // The organization is being synchronized to the identity provider and is not ready for use yet.
  //
  // During this state, the system is:
  // - Creating an organization in the identity provider
  // - Creating the break-glass account
  // - Assigning IDP manager permissions
  //
  // Users cannot be added to organizations in PENDING state.
  ORGANIZATION_STATE_PENDING = 1;

  // The organization has been successfully synchronized to the identity provider and is fully operational.
  //
  // In this state:
  // - IDP organization exists and is configured
  // - Break-glass account is created and has proper permissions
  // - Users can be added to the organization
  // - The organization is ready for use
  ORGANIZATION_STATE_SYNCED = 2;

  // The organization synchronization to the IDP has failed and the organization is unusable.
  //
  // Common failure reasons include:
  // - IDP connection timeout or network issues
  // - Organization name already exists in the IDP
  // - Invalid organization name format (doesn't meet IDP requirements)
  // - IDP authentication or authorization failure
  // - Break-glass account creation failure
  //
  // The status.message field will contain specific error details. Failed organizations typically require deletion
  // and recreation with corrected parameters, or manual IDP cleanup.
  ORGANIZATION_STATE_FAILED = 3;
}
