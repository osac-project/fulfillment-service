syntax = "proto3";

package osac.public.v1;

import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "osac/public/v1/project_membership_type.proto";

// Request message for listing project memberships.
message ProjectMembershipsListRequest {
  // Index of the first result. If not specified the default value will be zero.
  optional int32 offset = 1;

  // Maximum number of results to be returned by the server. When not specified all the results will be returned. Note
  // that there may not be enough results to return, and that the server may decide, for performance reasons, to return
  // less results than requested.
  optional int32 limit = 2;

  // Filter criteria.
  //
  // The value of this parameter is a [CEL](https://cel.dev) expression used to select which objects to return. The
  // built-in `this` variable refers to the object being tested and `now` refers to the current date and time. If the
  // expression evaluates to `true` the object is included in the results. For example, to retrieve all memberships
  // for a specific project:
  //
  //     this.spec.project == "019dd9f6-36cb-7824-ac1c-6455d8a7a9b5"
  //
  // To retrieve all memberships for a specific user:
  //
  //     this.spec.user == "019dd9f7-8823-7b24-8c1d-123456789abc"
  //
  // To retrieve all manager memberships:
  //
  //     this.spec.role == osac.public.v1.ProjectMembershipRole.PROJECT_MEMBERSHIP_ROLE_MANAGER
  //
  // If this isn't provided, or if the value is empty, then all the project memberships that the user has permission to
  // see will be returned. Not all CEL constructs are currently supported for implementation reasons; see the filter
  // documentation (docs/FILTER.md) for the full details.
  optional string filter = 3;

  // Order criteria.
  //
  // The syntax of this parameter is similar to the syntax of the _order by_ clause of a SQL statement, but using the
  // names of the attributes of the project membership instead of the names of the columns of a table. For example, in
  // order to sort the project memberships descending by name the value should be:
  //
  //     metadata.name desc
  //
  // If the parameter isn't provided, or if the value is empty, then the order of the results is undefined.
  optional string order = 4;
}

// Response message for listing project memberships.
message ProjectMembershipsListResponse {
  // Actual number of items returned. Note that this may be smaller than the value requested in the `limit` parameter
  // of the request if there are not enough items, or if the system decides that returning that number of items isn't
  // feasible or convenient for performance reasons.
  int32 size = 1;

  // Total number of items of the collection that match the search criteria, regardless of the number of results
  // requested with the `limit` parameter.
  int32 total = 2;

  // List of results.
  repeated ProjectMembership items = 3;
}

// Request message for getting a single project membership.
message ProjectMembershipsGetRequest {
  // Unique identifier of the project membership to retrieve.
  string id = 1;
}

// Response message for getting a single project membership.
message ProjectMembershipsGetResponse {
  // The requested project membership object.
  ProjectMembership object = 1;
}

// Request message for creating a new project membership.
message ProjectMembershipsCreateRequest {
  // The project membership object to create.
  ProjectMembership object = 1;

  // When true, the server validates the request and returns the fully resolved object
  // without persisting it or triggering any side effects.
  bool dry_run = 2;
}

// Response message for creating a new project membership.
message ProjectMembershipsCreateResponse {
  // The created project membership object, including any server-generated fields.
  ProjectMembership object = 1;
}

// Request message for updating an existing project membership.
message ProjectMembershipsUpdateRequest {
  // The project membership object with updated fields.
  ProjectMembership object = 1;

  // Field mask specifying which fields to update. If not provided, all fields will be updated.
  google.protobuf.FieldMask update_mask = 2;

  // Lock enables optimistic locking. When set to true, the server verifies that the current version of the object
  // matches the value of the metadata.version field of the submitted object. If they differ the update will be
  // rejected. This is useful to prevent lost updates when multiple clients are modifying the same object concurrently.
  bool lock = 3;
}

// Response message for updating an existing project membership.
message ProjectMembershipsUpdateResponse {
  // The updated project membership object.
  ProjectMembership object = 1;
}

// Request message for deleting a project membership.
message ProjectMembershipsDeleteRequest {
  // Unique identifier of the project membership to delete.
  string id = 1;
}

// Response message for deleting a project membership.
message ProjectMembershipsDeleteResponse {}

// Service for managing project memberships.
//
// Project memberships define which users have access to a project and what their role is (viewer or manager). Only
// project managers and administrators can create, update, or delete project memberships.
service ProjectMemberships {
  // Retrieves the list of project memberships.
  rpc List(ProjectMembershipsListRequest) returns (ProjectMembershipsListResponse) {
    option (google.api.http) = {get: "/api/fulfillment/v1/project_memberships"};
  }

  // Retrieves the details of one specific project membership.
  rpc Get(ProjectMembershipsGetRequest) returns (ProjectMembershipsGetResponse) {
    option (google.api.http) = {
      get: "/api/fulfillment/v1/project_memberships/{id}"
      response_body: "object"
    };
  }

  // Creates a new project membership.
  rpc Create(ProjectMembershipsCreateRequest) returns (ProjectMembershipsCreateResponse) {
    option (google.api.http) = {
      post: "/api/fulfillment/v1/project_memberships"
      body: "object"
      response_body: "object"
    };
  }

  // Updates an existing project membership.
  rpc Update(ProjectMembershipsUpdateRequest) returns (ProjectMembershipsUpdateResponse) {
    option (google.api.http) = {
      patch: "/api/fulfillment/v1/project_memberships/{object.id}"
      body: "object"
      response_body: "object"
    };
  }

  // Deletes a project membership.
  rpc Delete(ProjectMembershipsDeleteRequest) returns (ProjectMembershipsDeleteResponse) {
    option (google.api.http) = {delete: "/api/fulfillment/v1/project_memberships/{id}"};
  }
}
