syntax = "proto3";

package osac.public.v1;

import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "osac/public/v1/secret_type.proto";

// Request message for listing secrets.
message SecretsListRequest {
  // Index of the first result. If not specified the default value will be zero.
  optional int32 offset = 1;

  // Maximum number of results to be returned by the server. When not specified all the results will be returned. Note
  // that there may not be enough results to return, and that the server may decide, for performance reasons, to return
  // less results than requested.
  optional int32 limit = 2;

  // Filter criteria.
  //
  // The value of this parameter is a [CEL](https://cel.dev) expression used to select which objects to return. The
  // built-in `this` variable refers to the object being tested and `now` refers to the current date and time. If the
  // expression evaluates to `true` the object is included in the results. For example, to retrieve all secrets with
  // names starting with `tls`:
  //
  //     this.metadata.name.startsWith("tls")
  //
  // If this isn't provided, or if the value is empty, then all the secrets that the user has permission to see will be
  // returned. Not all CEL constructs are currently supported for implementation reasons; see the filter documentation
  // (docs/FILTER.md) for the full details.
  optional string filter = 3;

  // Order criteria.
  //
  // The syntax of this parameter is similar to the syntax of the _order by_ clause of a SQL statement, but using the
  // names of the attributes of the secret instead of the names of the columns of a table. For example, in order to
  // sort the secrets descending by name the value should be:
  //
  //     metadata.name desc
  //
  // If the parameter isn't provided, or if the value is empty, then the order of the results is undefined.
  optional string order = 4;
}

// Response message for listing secrets.
message SecretsListResponse {
  // Actual number of items returned. Note that this may be smaller than the value requested in the `limit` parameter
  // of the request if there are not enough items, or if the system decides that returning that number of items isn't
  // feasible or convenient for performance reasons.
  int32 size = 1;

  // Total number of items of the collection that match the search criteria, regardless of the number of results
  // requested with the `limit` parameter.
  int32 total = 2;

  // List of results.
  repeated Secret items = 3;
}

// Request message for getting a single secret.
message SecretsGetRequest {
  // Unique identifier of the secret to retrieve.
  string id = 1;
}

// Response message for getting a single secret.
message SecretsGetResponse {
  // The requested secret object.
  Secret object = 1;
}

// Request message for creating a new secret.
message SecretsCreateRequest {
  // The secret object to create.
  Secret object = 1;
}

// Response message for creating a new secret.
message SecretsCreateResponse {
  // The created secret object, including any server-generated fields.
  Secret object = 1;
}

// Request message for updating an existing secret.
message SecretsUpdateRequest {
  // The secret object with updated fields.
  Secret object = 1;

  // Field mask specifying which fields to update. If not provided, all fields will be updated.
  google.protobuf.FieldMask update_mask = 2;

  // Lock enables optimistic locking. When set to true, the server verifies that the current version of the object
  // matches the value of the metadata.version field of the submitted object. If they differ the update will be
  // rejected. This is useful to prevent lost updates when multiple clients are modifying the same object concurrently.
  bool lock = 3;
}

// Response message for updating an existing secret.
message SecretsUpdateResponse {
  // The updated secret object.
  Secret object = 1;
}

// Request message for deleting a secret.
message SecretsDeleteRequest {
  // Unique identifier of the secret to delete.
  string id = 1;
}

// Response message for deleting a secret.
message SecretsDeleteResponse {}

// Service for managing secrets.
//
// Secrets store sensitive key-value data such as TLS certificates, pull secrets, and credentials. They are scoped to
// a tenant and can be referenced by other resources that require sensitive configuration data.
service Secrets {
  // Retrieves the list of secrets.
  rpc List(SecretsListRequest) returns (SecretsListResponse) {
    option (google.api.http) = {get: "/api/fulfillment/v1/secrets"};
  }

  // Retrieves the details of one specific secret.
  rpc Get(SecretsGetRequest) returns (SecretsGetResponse) {
    option (google.api.http) = {
      get: "/api/fulfillment/v1/secrets/{id}"
      response_body: "object"
    };
  }

  // Creates a new secret.
  rpc Create(SecretsCreateRequest) returns (SecretsCreateResponse) {
    option (google.api.http) = {
      post: "/api/fulfillment/v1/secrets"
      body: "object"
      response_body: "object"
    };
  }

  // Updates an existing secret.
  rpc Update(SecretsUpdateRequest) returns (SecretsUpdateResponse) {
    option (google.api.http) = {
      patch: "/api/fulfillment/v1/secrets/{object.id}"
      body: "object"
      response_body: "object"
    };
  }

  // Deletes a secret.
  rpc Delete(SecretsDeleteRequest) returns (SecretsDeleteResponse) {
    option (google.api.http) = {delete: "/api/fulfillment/v1/secrets/{id}"};
  }
}
