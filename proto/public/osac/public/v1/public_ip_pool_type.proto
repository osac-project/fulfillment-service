syntax = "proto3";

package osac.public.v1;

import "google/api/field_behavior.proto";
import "osac/public/v1/metadata_type.proto";

// Represents a pool of public IP addresses available for allocation.
//
// PublicIPPools are administrator-managed resources. The public API only surfaces pools that are
// ready and have available capacity; state and capacity fields are intentionally not exposed.
// Tenants use this resource to discover available pools and select one when allocating a PublicIP.
message PublicIPPool {
  // Unique identifier of the public IP pool.
  string id = 1;

  // Metadata of the public IP pool, including name, labels, and timestamps.
  Metadata metadata = 2;

  // Configuration of the public IP pool.
  PublicIPPoolSpec spec = 3;
}

// Defines the configuration of a PublicIPPool.
message PublicIPPoolSpec {
  // Field 1 is reserved for future use.

  // CIDR ranges for this pool. Immutable after creation.
  repeated string cidrs = 2 [(google.api.field_behavior) = IMMUTABLE];

  // IP address family for this pool. Immutable after creation.
  IPFamily ip_family = 3 [(google.api.field_behavior) = IMMUTABLE];
}

// IP address family for a PublicIPPool.
enum IPFamily {
  // IP family is unknown or has not been specified.
  IP_FAMILY_UNSPECIFIED = 0;

  // IPv4 address family.
  IP_FAMILY_IPV4 = 1;

  // IPv6 address family.
  IP_FAMILY_IPV6 = 2;
}
