syntax = "proto3";

package osac.public.v1;

import "google/api/annotations.proto";
import "osac/public/v1/public_ip_attachment_type.proto";

message PublicIPAttachmentsListRequest {
  // Index of the first result. If not specified the default value will be zero.
  optional int32 offset = 1;

  // Maximum number of results to be returned by the server. When not specified all the results will be returned. Note
  // that there may not be enough results to return, and that the server may decide, for performance reasons, to return
  // less results than requested.
  optional int32 limit = 2;

  // Filter criteria.
  //
  // The value of this parameter is a [CEL](https://cel.dev) expression used to select which objects to return. The
  // built-in `this` variable refers to the object being tested and `now` refers to the current date and time. If the
  // expression evaluates to `true` the object is included in the results. For example, to retrieve all attachments
  // in READY state:
  //
  //     this.status.state == PUBLIC_IP_ATTACHMENT_STATE_READY
  //
  // If this isn't provided, or if the value is empty, then all the public IP attachments that the user has permission
  // to see will be returned.
  optional string filter = 3;

  // Order criteria.
  //
  // The syntax of this parameter is similar to the syntax of the _order by_ clause of a SQL statement, but using the
  // names of the attributes of the public IP attachment instead of the names of the columns of a table. For example,
  // in order to sort the attachments descending by creation time the value should be:
  //
  //     metadata.created_at desc
  //
  // If the parameter isn't provided, or if the value is empty, then the order of the results is undefined.
  optional string order = 4;
}

message PublicIPAttachmentsListResponse {
  // Actual number of items returned.
  int32 size = 1;

  // Total number of items of the collection that match the search criteria.
  int32 total = 2;

  // List of results.
  repeated PublicIPAttachment items = 3;
}

message PublicIPAttachmentsGetRequest {
  string id = 1;
}

message PublicIPAttachmentsGetResponse {
  PublicIPAttachment object = 1;
}

message PublicIPAttachmentsCreateRequest {
  PublicIPAttachment object = 1;
}

message PublicIPAttachmentsCreateResponse {
  PublicIPAttachment object = 1;
}

message PublicIPAttachmentsDeleteRequest {
  string id = 1;
}

message PublicIPAttachmentsDeleteResponse {}

service PublicIPAttachments {
  // Retrieves the list of public IP attachments.
  rpc List(PublicIPAttachmentsListRequest) returns (PublicIPAttachmentsListResponse) {
    option (google.api.http) = {get: "/api/fulfillment/v1/public_ip_attachments"};
  }

  // Retrieves the details of one specific public IP attachment.
  rpc Get(PublicIPAttachmentsGetRequest) returns (PublicIPAttachmentsGetResponse) {
    option (google.api.http) = {
      get: "/api/fulfillment/v1/public_ip_attachments/{id}"
      response_body: "object"
    };
  }

  // Creates a new public IP attachment. Binds a PublicIP to a target resource.
  rpc Create(PublicIPAttachmentsCreateRequest) returns (PublicIPAttachmentsCreateResponse) {
    option (google.api.http) = {
      post: "/api/fulfillment/v1/public_ip_attachments"
      body: "object"
      response_body: "object"
    };
  }

  // Deletes a public IP attachment. Triggers the detach workflow to unbind the PublicIP from the target.
  rpc Delete(PublicIPAttachmentsDeleteRequest) returns (PublicIPAttachmentsDeleteResponse) {
    option (google.api.http) = {delete: "/api/fulfillment/v1/public_ip_attachments/{id}"};
  }
}
