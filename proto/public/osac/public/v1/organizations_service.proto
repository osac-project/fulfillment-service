syntax = "proto3";

package osac.public.v1;

import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "osac/public/v1/organization_type.proto";

message OrganizationsListRequest {
  // Index of the first result. If not specified the default value will be zero.
  optional int32 offset = 1;

  // Maximum number of results to be returned by the server. When not specified all the results will be returned. Note
  // that there may not be enough results to return, and that the server may decide, for performance reasons, to return
  // less results than requested.
  optional int32 limit = 2;

  // Filter criteria.
  //
  // The value of this parameter is a [CEL](https://cel.dev) expression used to select which objects to return. The
  // built-in `this` variable refers to the object being tested and `now` refers to the current date and time. If the
  // expression evaluates to `true` the object is included in the results. For example, to retrieve all organizations with
  // names starting with `my`:
  //
  //     this.metadata.name.startsWith("my")
  //
  // If this isn't provided, or if the value is empty, then all the organizations that the user has permission to see will be
  // returned. Not all CEL constructs are currently supported for implementation reasons; see the filter documentation
  // (docs/FILTER.md) for the full details.
  optional string filter = 3;

  // Order criteria.
  optional string order = 4;
}

message OrganizationsListResponse {
  // Actual number of items returned.
  int32 size = 3;

  // Total number of items of the collection that match the search criteria.
  int32 total = 4;

  // List of results.
  repeated Organization items = 5;
}

message OrganizationsGetRequest {
  string id = 1;
}

message OrganizationsGetResponse {
  Organization object = 1;
}

message OrganizationsCreateRequest {
  Organization object = 1;
}

message OrganizationsCreateResponse {
  Organization object = 1;
}

message OrganizationsUpdateRequest {
  Organization object = 1;
  google.protobuf.FieldMask update_mask = 2;

  // Lock enables optimistic locking. When set to true, the server verifies that the current version of the object
  // matches the value of the metadata.version field of the submitted object. If they differ the update will be
  // rejected. This is useful to prevent lost updates when multiple clients are modifying the same object concurrently.
  bool lock = 3;
}

message OrganizationsUpdateResponse {
  Organization object = 1;
}

message OrganizationsDeleteRequest {
  string id = 1;
}

message OrganizationsDeleteResponse {}

service Organizations {
  // Retrieves the list of organizations.
  rpc List(OrganizationsListRequest) returns (OrganizationsListResponse) {
    option (google.api.http) = {get: "/api/fulfillment/v1/organizations"};
  }

  // Retrieves the details of one specific organization.
  rpc Get(OrganizationsGetRequest) returns (OrganizationsGetResponse) {
    option (google.api.http) = {
      get: "/api/fulfillment/v1/organizations/{id}"
      response_body: "object"
    };
  }

  // Creates a new organization.
  rpc Create(OrganizationsCreateRequest) returns (OrganizationsCreateResponse) {
    option (google.api.http) = {
      post: "/api/fulfillment/v1/organizations"
      body: "object"
      response_body: "object"
    };
  }

  // Updates an existing organization.
  rpc Update(OrganizationsUpdateRequest) returns (OrganizationsUpdateResponse) {
    option (google.api.http) = {
      patch: "/api/fulfillment/v1/organizations/{object.id}"
      body: "object"
      response_body: "object"
    };
  }

  // Deletes an organization.
  rpc Delete(OrganizationsDeleteRequest) returns (OrganizationsDeleteResponse) {
    option (google.api.http) = {delete: "/api/fulfillment/v1/organizations/{id}"};
  }
}
