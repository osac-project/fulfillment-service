syntax = "proto3";

package osac.public.v1;

// Represents an OAuth token issuer with both an in-cluster and an external URL.
message TokenIssuer {
  // The in-cluster URL of the OAuth issuer (e.g. the internal Keycloak service URL). Used by
  // services running inside the cluster for server-side token validation.
  string internal_url = 1;

  // The externally accessible URL of the OAuth issuer. Clients running outside the cluster
  // (browsers, CLI) should use this URL to perform OAuth flows (authorization code, device flow,
  // etc.). The tokens issued via this URL are accepted by the server because the external and
  // internal Keycloak instances are the same — only the hostname differs.
  string external_url = 2;
}

// Contains the information that helps client know how authentication is managed by the server.
message AuthnCapabilities {
  // A list of the OAuth token issuers trusted by the server.
  //
  // Each entry exposes both an in-cluster URL (for server-side validation and in-cluster clients)
  // and an external URL (for browsers and external CLI users performing OAuth flows).
  //
  // Clients can use the OAuth discovery endpoint to find the details of the OAuth server:
  //
  //   https://my.oauth.com/.well-known/oauth-authorization-server
  //
  // The discovery process is defined in [RFC 8414](https://datatracker.ietf.org/doc/html/rfc8414).
  //
  // Note that having an access token issued by one of these servers doesn't guarantee that the
  // requests from the user will be accepted: it will still be subject to authorization checks.
  repeated TokenIssuer trusted_token_issuers = 1;
}
