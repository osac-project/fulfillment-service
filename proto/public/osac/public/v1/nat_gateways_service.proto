syntax = "proto3";

package osac.public.v1;

import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "osac/public/v1/nat_gateway_type.proto";

message NATGatewaysListRequest {
  // Index of the first result. If not specified the default value will be zero.
  optional int32 offset = 1;

  // Maximum number of results to be returned by the server. When not specified all the results will be returned. Note
  // that there may not be enough results to return, and that the server may decide, for performance reasons, to return
  // less results than requested.
  optional int32 limit = 2;

  // Filter criteria.
  //
  // The value of this parameter is a [CEL](https://cel.dev) expression used to select which objects to return. The
  // built-in `this` variable refers to the object being tested and `now` refers to the current date and time. If the
  // expression evaluates to `true` the object is included in the results. For example, to retrieve all NAT gateways
  // in READY state:
  //
  //     this.status.state == NAT_GATEWAY_STATE_READY
  //
  // If this isn't provided, or if the value is empty, then all the NAT gateways that the user has permission to see
  // will be returned. Not all CEL constructs are currently supported for implementation reasons; see the filter
  // documentation (docs/FILTER.md) for the full details.
  optional string filter = 3;

  // Order criteria.
  //
  // The syntax of this parameter is similar to the syntax of the _order by_ clause of a SQL statement, but using the
  // names of the attributes of the NAT gateway instead of the names of the columns of a table. For example, in order
  // to sort the NAT gateways descending by creation time the value should be:
  //
  //     metadata.created_at desc
  //
  // If the parameter isn't provided, or if the value is empty, then the order of the results is undefined.
  optional string order = 4;
}

message NATGatewaysListResponse {
  // Actual number of items returned. Note that this may be smaller than the value requested in the `limit` parameter
  // of the request if there are not enough items, or if the system decides that returning that number of items isn't
  // feasible or convenient for performance reasons.
  int32 size = 1;

  // Total number of items of the collection that match the search criteria, regardless of the number of results
  // requested with the `limit` parameter.
  int32 total = 2;

  // List of results.
  repeated NATGateway items = 3;
}

message NATGatewaysGetRequest {
  string id = 1;
}

message NATGatewaysGetResponse {
  NATGateway object = 1;
}

message NATGatewaysCreateRequest {
  NATGateway object = 1;
}

message NATGatewaysCreateResponse {
  NATGateway object = 1;
}

message NATGatewaysUpdateRequest {
  NATGateway object = 1;
  google.protobuf.FieldMask update_mask = 2;

  // Lock enables optimistic locking. When set to true, the server verifies that the current version of the object
  // matches the value of the metadata.version field of the submitted object. If they differ the update will be
  // rejected. This is useful to prevent lost updates when multiple clients are modifying the same object concurrently.
  bool lock = 3;
}

message NATGatewaysUpdateResponse {
  NATGateway object = 1;
}

message NATGatewaysDeleteRequest {
  string id = 1;
}

message NATGatewaysDeleteResponse {}

service NATGateways {
  // Retrieves the list of NAT gateways.
  rpc List(NATGatewaysListRequest) returns (NATGatewaysListResponse) {
    option (google.api.http) = {get: "/api/fulfillment/v1/nat_gateways"};
  }

  // Retrieves the details of one specific NAT gateway.
  rpc Get(NATGatewaysGetRequest) returns (NATGatewaysGetResponse) {
    option (google.api.http) = {
      get: "/api/fulfillment/v1/nat_gateways/{id}"
      response_body: "object"
    };
  }

  // Creates a new NAT gateway. Configures outbound SNAT for a VirtualNetwork using an ExternalIP.
  rpc Create(NATGatewaysCreateRequest) returns (NATGatewaysCreateResponse) {
    option (google.api.http) = {
      post: "/api/fulfillment/v1/nat_gateways"
      body: "object"
      response_body: "object"
    };
  }

  // Updates an existing NAT gateway. Allows modifying metadata (labels, annotations).
  rpc Update(NATGatewaysUpdateRequest) returns (NATGatewaysUpdateResponse) {
    option (google.api.http) = {
      patch: "/api/fulfillment/v1/nat_gateways/{object.id}"
      body: "object"
      response_body: "object"
    };
  }

  // Deletes a NAT gateway. The SNAT rule is removed and the ExternalIP is released for other use.
  rpc Delete(NATGatewaysDeleteRequest) returns (NATGatewaysDeleteResponse) {
    option (google.api.http) = {delete: "/api/fulfillment/v1/nat_gateways/{id}"};
  }
}
