syntax = "proto3";

package osac.public.v1;

import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "osac/public/v1/tenant_type.proto";

message TenantsListRequest {
  // Index of the first result. If not specified the default value will be zero.
  optional int32 offset = 1;

  // Maximum number of results to be returned by the server. When not specified all the results will be returned. Note
  // that there may not be enough results to return, and that the server may decide, for performance reasons, to return
  // less results than requested.
  optional int32 limit = 2;

  // Filter criteria.
  //
  // The value of this parameter is a [CEL](https://cel.dev) expression used to select which objects to return. The
  // built-in `this` variable refers to the object being tested and `now` refers to the current date and time. If the
  // expression evaluates to `true` the object is included in the results. For example, to retrieve all tenants with
  // names starting with `my`:
  //
  //     this.metadata.name.startsWith("my")
  //
  // If this isn't provided, or if the value is empty, then all the tenants that the user has permission to see will be
  // returned. Not all CEL constructs are currently supported for implementation reasons; see the filter documentation
  // (docs/FILTER.md) for the full details.
  optional string filter = 3;

  // Order criteria.
  optional string order = 4;
}

message TenantsListResponse {
  // Actual number of items returned.
  int32 size = 1;

  // Total number of items of the collection that match the search criteria.
  int32 total = 2;

  // List of results.
  repeated Tenant items = 3;
}

message TenantsGetRequest {
  string id = 1;
}

message TenantsGetResponse {
  Tenant object = 1;
}

message TenantsCreateRequest {
  Tenant object = 1;

  // When true, the server validates the request and returns the fully resolved object
  // without persisting it or triggering any side effects.
  bool dry_run = 2;
}

message TenantsCreateResponse {
  Tenant object = 1;
}

message TenantsUpdateRequest {
  Tenant object = 1;
  google.protobuf.FieldMask update_mask = 2;

  // Lock enables optimistic locking. When set to true, the server verifies that the current version of the object
  // matches the value of the metadata.version field of the submitted object. If they differ the update will be
  // rejected. This is useful to prevent lost updates when multiple clients are modifying the same object concurrently.
  bool lock = 3;
}

message TenantsUpdateResponse {
  Tenant object = 1;
}

message TenantsDeleteRequest {
  string id = 1;
}

message TenantsDeleteResponse {}

service Tenants {
  // Retrieves the list of tenants.
  rpc List(TenantsListRequest) returns (TenantsListResponse) {
    option (google.api.http) = {get: "/api/fulfillment/v1/tenants"};
  }

  // Retrieves the details of one specific tenant.
  rpc Get(TenantsGetRequest) returns (TenantsGetResponse) {
    option (google.api.http) = {
      get: "/api/fulfillment/v1/tenants/{id}"
      response_body: "object"
    };
  }

  // Creates a new tenant.
  rpc Create(TenantsCreateRequest) returns (TenantsCreateResponse) {
    option (google.api.http) = {
      post: "/api/fulfillment/v1/tenants"
      body: "object"
      response_body: "object"
    };
  }

  // Updates an existing tenant.
  rpc Update(TenantsUpdateRequest) returns (TenantsUpdateResponse) {
    option (google.api.http) = {
      patch: "/api/fulfillment/v1/tenants/{object.id}"
      body: "object"
      response_body: "object"
    };
  }

  // Deletes a tenant.
  rpc Delete(TenantsDeleteRequest) returns (TenantsDeleteResponse) {
    option (google.api.http) = {delete: "/api/fulfillment/v1/tenants/{id}"};
  }
}
