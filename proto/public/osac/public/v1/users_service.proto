syntax = "proto3";

package osac.public.v1;

import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "osac/public/v1/user_type.proto";

message UsersListRequest {
  // Index of the first result. If not specified the default value will be zero.
  optional int32 offset = 1;

  // Maximum number of results to be returned by the server. When not specified all the results will be returned. Note
  // that there may not be enough results to return, and that the server may decide, for performance reasons, to return
  // less results than requested.
  optional int32 limit = 2;

  // Filter criteria.
  //
  // The value of this parameter is a [CEL](https://cel.dev) expression used to select which objects to return.
  // If this isn't provided, or if the value is empty, then all the users that the caller has permission to see will be
  // returned.
  optional string filter = 3;

  // Order criteria.
  //
  // The syntax of this parameter is similar to the syntax of the _order by_ clause of a SQL statement, but using the
  // names of the attributes of the user instead of the names of the columns of a table. For example, in order to
  // sort the users descending by username the value should be:
  //
  //     username desc
  //
  // If the parameter isn't provided, or if the value is empty, then the order of the results is undefined.
  optional string order = 4;
}

message UsersListResponse {
  // Actual number of items returned.
  int32 size = 1;

  // Total number of items matching the search criteria.
  int32 total = 2;

  // List of users.
  repeated User items = 3;
}

message UsersGetRequest {
  string id = 1;
}

message UsersGetResponse {
  User object = 1;
}

message UsersCreateRequest {
  User object = 1;
}

message UsersCreateResponse {
  User object = 1;
}

message UsersUpdateRequest {
  User object = 1;
  google.protobuf.FieldMask update_mask = 2;

  // Lock enables optimistic locking. When set to true, the server verifies that the current version of the object
  // matches the value of the metadata.version field of the submitted object. If they differ the update will be
  // rejected. This is useful to prevent lost updates when multiple clients are modifying the same object concurrently.
  bool lock = 3;
}

message UsersUpdateResponse {
  User object = 1;
}

message UsersDeleteRequest {
  string id = 1;
}

message UsersDeleteResponse {}

service Users {
  // Retrieves the list of users.
  rpc List(UsersListRequest) returns (UsersListResponse) {
    option (google.api.http) = {get: "/api/fulfillment/v1/users"};
  }

  // Retrieves the details of one specific user.
  rpc Get(UsersGetRequest) returns (UsersGetResponse) {
    option (google.api.http) = {
      get: "/api/fulfillment/v1/users/{id}"
      response_body: "object"
    };
  }

  // Creates a new user.
  rpc Create(UsersCreateRequest) returns (UsersCreateResponse) {
    option (google.api.http) = {
      post: "/api/fulfillment/v1/users"
      body: "object"
      response_body: "object"
    };
  }

  // Updates an existing user.
  rpc Update(UsersUpdateRequest) returns (UsersUpdateResponse) {
    option (google.api.http) = {
      patch: "/api/fulfillment/v1/users/{object.id}"
      body: "object"
      response_body: "object"
    };
  }

  // Deletes a user.
  rpc Delete(UsersDeleteRequest) returns (UsersDeleteResponse) {
    option (google.api.http) = {delete: "/api/fulfillment/v1/users/{id}"};
  }
}
