syntax = "proto3";

package osac.public.v1;

import "osac/public/v1/console_service.proto";

// Client-to-server message for the console proxy stream.
message ConsoleProxyConnectRequest {
  ConsoleInput input = 1;
}

// Server-to-client message for the console proxy stream.
message ConsoleProxyConnectResponse {
  oneof payload {
    ConsoleOutput output = 1;
    ConsoleStatus status = 2;
  }
}

// Service for proxied console connections. Auth is NOT in the data stream:
// the ticket travels in the Authorization header (Bearer scheme) via per-call
// PerRPCCredentials. The CLI uses a separate connection without channel-level
// credentials for this service, keeping the ticket isolated from the Keycloak JWT.
// The stream is a pure byte pipe.
service ConsoleProxy {
  // Bidirectional stream for proxied console access.
  //
  // No google.api.http annotation: gRPC-Gateway does not support bidi streaming.
  rpc Connect(stream ConsoleProxyConnectRequest) returns (stream ConsoleProxyConnectResponse);
}
