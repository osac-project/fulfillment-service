syntax = "proto3";

package osac.public.v1;

import "google/api/annotations.proto";
import "osac/public/v1/external_ip_pool_type.proto";

message ExternalIPPoolsListRequest {
  // Index of the first result. If not specified the default value will be zero.
  optional int32 offset = 1;

  // Maximum number of results to be returned by the server. When not specified all the results will be returned.
  optional int32 limit = 2;

  // Filter criteria.
  //
  // The value of this parameter is a [CEL](https://cel.dev) expression used to select which objects to return. The
  // built-in `this` variable refers to the object being tested. For example, to retrieve all IPv4 pools:
  //
  //     this.spec.ip_family == IP_FAMILY_IPV4
  //
  // If this isn't provided, or if the value is empty, then all pools visible to the user are returned.
  optional string filter = 3;
}

message ExternalIPPoolsListResponse {
  // Actual number of items returned.
  int32 size = 1;

  // Total number of items matching the search criteria.
  int32 total = 2;

  // List of results.
  repeated ExternalIPPool items = 3;
}

message ExternalIPPoolsGetRequest {
  string id = 1;
}

message ExternalIPPoolsGetResponse {
  ExternalIPPool object = 1;
}

service ExternalIPPools {
  // Retrieves the list of external IP pools visible to the caller.
  rpc List(ExternalIPPoolsListRequest) returns (ExternalIPPoolsListResponse) {
    option (google.api.http) = {get: "/api/fulfillment/v1/external_ip_pools"};
  }

  // Retrieves the details of one specific external IP pool.
  rpc Get(ExternalIPPoolsGetRequest) returns (ExternalIPPoolsGetResponse) {
    option (google.api.http) = {
      get: "/api/fulfillment/v1/external_ip_pools/{id}"
      response_body: "object"
    };
  }
}
