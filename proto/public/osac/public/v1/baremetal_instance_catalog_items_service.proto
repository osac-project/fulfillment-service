syntax = "proto3";

package osac.public.v1;

import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "osac/public/v1/baremetal_instance_catalog_item_type.proto";

message BareMetalInstanceCatalogItemsListRequest {
  optional int32 offset = 1;
  optional int32 limit = 2;
  optional string filter = 3;
  optional string order = 4;
}

message BareMetalInstanceCatalogItemsListResponse {
  int32 size = 1;
  int32 total = 2;
  repeated BareMetalInstanceCatalogItem items = 3;
}

message BareMetalInstanceCatalogItemsGetRequest {
  string id = 1;
}

message BareMetalInstanceCatalogItemsGetResponse {
  BareMetalInstanceCatalogItem object = 1;
}

message BareMetalInstanceCatalogItemsCreateRequest {
  BareMetalInstanceCatalogItem object = 1;
}

message BareMetalInstanceCatalogItemsCreateResponse {
  BareMetalInstanceCatalogItem object = 1;
}

message BareMetalInstanceCatalogItemsUpdateRequest {
  BareMetalInstanceCatalogItem object = 1;
  google.protobuf.FieldMask update_mask = 2;

  // Lock enables optimistic locking. When set to true, the server verifies that the current version of the object
  // matches the value of the metadata.version field of the submitted object. If they differ the update will be
  // rejected.
  bool lock = 3;
}

message BareMetalInstanceCatalogItemsUpdateResponse {
  BareMetalInstanceCatalogItem object = 1;
}

message BareMetalInstanceCatalogItemsDeleteRequest {
  string id = 1;
}

message BareMetalInstanceCatalogItemsDeleteResponse {}

service BareMetalInstanceCatalogItems {
  rpc List(BareMetalInstanceCatalogItemsListRequest) returns (BareMetalInstanceCatalogItemsListResponse) {
    option (google.api.http) = {get: "/api/fulfillment/v1/baremetal_instance_catalog_items"};
  }
  rpc Get(BareMetalInstanceCatalogItemsGetRequest) returns (BareMetalInstanceCatalogItemsGetResponse) {
    option (google.api.http) = {
      get: "/api/fulfillment/v1/baremetal_instance_catalog_items/{id}"
      response_body: "object"
    };
  }
  rpc Create(BareMetalInstanceCatalogItemsCreateRequest) returns (BareMetalInstanceCatalogItemsCreateResponse) {
    option (google.api.http) = {
      post: "/api/fulfillment/v1/baremetal_instance_catalog_items"
      body: "object"
      response_body: "object"
    };
  }
  rpc Update(BareMetalInstanceCatalogItemsUpdateRequest) returns (BareMetalInstanceCatalogItemsUpdateResponse) {
    option (google.api.http) = {
      patch: "/api/fulfillment/v1/baremetal_instance_catalog_items/{object.id}"
      body: "object"
      response_body: "object"
    };
  }
  rpc Delete(BareMetalInstanceCatalogItemsDeleteRequest) returns (BareMetalInstanceCatalogItemsDeleteResponse) {
    option (google.api.http) = {delete: "/api/fulfillment/v1/baremetal_instance_catalog_items/{id}"};
  }
}
