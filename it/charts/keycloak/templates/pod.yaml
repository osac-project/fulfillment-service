apiVersion: v1
kind: Pod
metadata:
  namespace: {{ .Release.Namespace }}
  name: keycloak-service
  labels:
    app: keycloak-service
spec:
  volumes:
  - name: realm
    secret:
      secretName: keycloak-realm
  - name: tls
    secret:
      secretName: keycloak-tls
  - name: db
    projected:
      sources:
      {{- if .Values.database.connection }}
      {{ range .Values.database.connection }}
      {{ if .configMap }}
      - configMap:
          name: {{ .configMap.name }}
          items:
          {{ range .configMap.items }}
          - key: {{ .key }}
            path: {{ .param }}
          {{ end }}
      {{ end }}
      {{ if .secret }}
      - secret:
          name: {{ .secret.name }}
          items:
          {{ range .secret.items }}
          - key: {{ .key }}
            path: {{ .param }}
          {{ end }}
      {{ end }}
      {{ end }}
      {{else }}
        []
      {{end }}
  containers:
  - name: server
    image: "{{ .Values.images.keycloak }}"
    imagePullPolicy: IfNotPresent
    volumeMounts:
    - name: realm
      mountPath: /opt/keycloak/data/import
      readOnly: true
    - name: tls
      mountPath: /opt/keycloak/tls
      readOnly: true
    - name: db
      mountPath: /opt/keycloak/db
      readOnly: true
    env:
    - name: KC_BOOTSTRAP_ADMIN_USERNAME
      value: {{ .Values.admin.username | quote }}
    - name: KC_BOOTSTRAP_ADMIN_PASSWORD
      value: {{ .Values.admin.password | quote }}
    command:
    - /bin/bash
    - -c
    - {{ include "keycloak.start" . | quote }}
    ports:
    - name: https
      containerPort: 8000
    readinessProbe:
      httpGet:
        path: /realms/master
        port: 8000
        scheme: HTTPS
      initialDelaySeconds: 30
      periodSeconds: 10
    livenessProbe:
      httpGet:
        path: /realms/master
        port: 8000
        scheme: HTTPS
      initialDelaySeconds: 60
      periodSeconds: 30
